      const btn=isPaid
        ?`<button onclick="event.stopPropagation();unmarkRentPaid('${cid}')" style="background:rgba(67,160,71,.1);border:1px solid rgba(67,160,71,.3);color:var(--green2);border-radius:6px;padding:3px 9px;font-size:11px;font-family:inherit;cursor:pointer;white-space:nowrap">取消</button>`
        :(rent?`<button onclick="event.stopPropagation();markRentPaid(${idx})" style="background:var(--accent-bg);border:1px solid var(--accent-glow);color:var(--accent2);border-radius:6px;padding:3px 9px;font-size:11px;font-family:inherit;cursor:pointer;white-space:nowrap">收款</button>`:'');
      html+=`<div class="rent-item${isPaid?' task-done':''}" onclick="showDetail('contract',${idx})">
        <div class="rent-row"><div class="rent-addr" style="flex:1">${c['地址']||''}</div><div style="font-size:11px;color:var(--text2);flex-shrink:0;margin-left:8px">${dl}</div></div>

          <div style="display:flex;align-items:center;gap:6px;flex:1;min-width:0;flex-wrap:wrap">
            <span style="font-size:0.929em;font-weight:800;color:${mc};-webkit-text-stroke:0.3px ${mc==='var(--green2)'?'#2d6e31':mc==='#ffde87'?'#b8962c':'#666'}">${c['機型']||''} ${c['機號']||''}</span>
            ${expLbl}${paidLbl}${handlerLbl}
          </div>
          <div style="display:flex;align-items:center;gap:6px;flex-shrink:0">
            ${rent?`<span style="font-size:12px;font-weight:600;color:var(--green2)">NT$${rent.toLocaleString()}</span>`:''}
            ${dispatchBtn}${btn}
          </div>
        </div>
      </div>`;
    });
  });
  return html;
}

      return !h.length || h.includes(myName);
    });
  } else if (role === 'billing') {
    // 帳款專員：只顯示含自己經手人的
    list = list.filter(r => {
      const h = String(r['經手人']||'').split(/[,、，]/).map(s=>s.trim()).filter(Boolean);
      return !h.length || h.includes(myName);
    });
  }

  if (searchQuery) list = list.filter(r=>JSON.stringify(r).includes(searchQuery));

  // 子分頁：待維修 / 已完成
  const pending = list.filter(r=>(r['狀態']||'')!=='已完成');
  const done    = list.filter(r=>(r['狀態']||'')==='已完成');
  const showing = repairViewTab === 1 ? done : pending;

  const tabs = `<div class="task-tabs">
    <div class="task-tab${repairViewTab===0?' active':''}" onclick="setRepairView(0)">待維修 ${pending.length>0?`<span style="font-size:0.857em;opacity:.7">(${pending.length})</span>`:''}</div>
    <div class="task-tab${repairViewTab===1?' active':''}" onclick="setRepairView(1)">已完成 ${done.length>0?`<span style="font-size:0.857em;opacity:.7">(${done.length})</span>`:''}</div>
  </div>`;

  if (!showing.length) return tabs + `<div class="empty">${repairViewTab===1?'沒有已完成的維修紀錄':'目前沒有待維修項目 🎉'}</div>`;

  return tabs + `<div style="padding:0 0 80px">
    ${showing.map((r,_i)=>{
      const realIdx = (cache.repairs||[]).indexOf(r);
      const items = r['維修項目']||r['工作內容']||'';
      return `<div class="card" onclick="showRepairDetail(${realIdx})" style="cursor:pointer">
        <div style="display:flex;align-items:center;gap:7px;margin-bottom:6px">
          ${repairStatusChip(r['狀態']||'待維修')}
          ${repairKindChip(r['種類']||'')}
          <span style="font-size:0.786em;color:var(--text2);margin-left:auto">${String(r['紀錄日期']||'').substring(0,10).replace(/-/g,'/')}</span>
        </div>
        <div style="font-size:1em;font-weight:700">${r['機型']||''} <span style="font-size:0.857em;font-weight:400;color:var(--text2)">${r['機號']||''}</span></div>
        ${r['客戶名稱']?`<div style="font-size:0.857em;color:var(--text2);margin-top:2px">👤 ${r['客戶名稱']}</div>`:''}
        ${items?`<div style="font-size:0.857em;color:var(--accent2);margin-top:4px">🔧 ${items}</div>`:''}
      </div>`;
    }).join('')}
  </div>`;
}

function setRepairView(v) { repairViewTab = v; renderPage(); }

    ['種類',      repairKindChip(item['種類']||'')],

    ['完成日期',  String(item['完成日期']||'').substring(0,10)],
    ['客戶名稱',  item['客戶名稱']||'—'],
    ['機型',      item['機型']||'—'],

    <button class="btn-save" style="flex:1" onclick="toggleRepairDone(${idx})">${item['狀態']==='已完成'?'↩ 標為待維修':'✓ 標為已完成'}</button>
  </div>`;
  document.getElementById('detail-modal').classList.add('open');
}

function toggleRepairDone(idx) {
  const item = (cache.repairs||[])[idx];
  if (!item) return;
  const isDone = item['狀態'] === '已完成';

  // 取消完成：直接還原
  if (isDone) {
    item['狀態'] = '待維修';
    item['完成日期'] = '';
    saveCache();
    enqueue({action:'update', sheet:'repairs', data:item, id:item['維修ID']||item[Object.keys(item)[0]]});
    closeModal('detail-modal');
    renderPage();
    showToast('↩ 已改回待維修');
    return;
  }

  // 標記完成
  item['狀態'] = '已完成';
  item['完成日期'] = new Date().toISOString().substring(0,10).replace(/-/g,'/');
  saveCache();
  enqueue({action:'update', sheet:'repairs', data:item, id:item['維修ID']||item[Object.keys(item)[0]]});
  closeModal('detail-modal');
  renderPage();
  showToast('✓ 已標記完成');

  // 詢問是否新增收款
  appConfirm('是否要新增維修相關收款？',
    ()=>{
      // 依維修項目自動對應收款項目
      const repairItemStr = String(item['維修項目']||'');
      const repairItems = repairItemStr.split(/[,、，]/).map(s=>s.trim()).filter(Boolean);
      const preItems = [];
      const miscItems = []; // 其他項目 → 臨時加入收款 chip，不存入選項庫

      repairItems.forEach(ri=>{
        if (['檢修費','檢修'].includes(ri)) {
          if (!preItems.includes('維修費')) preItems.push('維修費');
        } else if (['大保養','保養'].includes(ri)) {
          if (!preItems.includes('保養費')) preItems.push('保養費');
        } else {
          miscItems.push(ri);
        }
      });
      // 其他項目也加入收款選取，但以 tempPayItems 存放（不寫入選項庫）
      miscItems.forEach(mi=>{ if(!preItems.includes(mi)) preItems.push(mi); });
      if (!preItems.length) preItems.push('維修費');

      tempPayItems = miscItems; // 本次臨時項目

      const custName = item['客戶名稱']||'';
      const taskDataForPay = {
        '客戶名稱': custName,
        '機型': item['機型']||'',
        '機號': item['機號']||'',
        '紀錄日期': item['完成日期']||'',
      };
      // 從「維修 報價」抓對應價格
      // 對照表：preItems 中每個項目 → 找 repairPricelist 的「名稱」欄位比對
      const priceMap = {};
      const rl = cache.repairPricelist||[];
      preItems.forEach(payItem=>{
        // 找直接同名的
        let row = rl.find(r=>String(r['名稱']||'').trim()===payItem);
        // 找不到時，試著找維修項目中對應的原始名稱（例如「維修費」對應「檢修費」）
        if (!row && payItem==='維修費') row = rl.find(r=>['檢修費','檢修','維修費'].includes(String(r['名稱']||'').trim()));
        if (!row && payItem==='保養費') row = rl.find(r=>['大保養','保養費','保養'].includes(String(r['名稱']||'').trim()));
        const price = Number(row?.['價格']||row?.['單價']||0);
        if (price) priceMap[payItem] = price;
      });

      // 開啟收款表單
      selectedPayItems = [...preItems]; selectedHandlers=[]; payLineItems=[]; payMethod=''; editMode=false; editId='';
      payInvoice='';
      initPayLines(null, priceMap);
      document.getElementById('form-modal-title').textContent='新增收款';
      document.getElementById('form-modal-body').innerHTML = paymentForm({
        '客戶名稱': custName,
        '詳細內容': [item['機型'],item['機號']].filter(Boolean).join(' '),
      });
      document.getElementById('form-modal').classList.add('open');
    },
    ()=>{}
  );
}

// ---- Repair Form ----
const REPAIR_STATUSES = ['待維修','已完成'];
const REPAIR_KINDS    = ['租送','買斷','客人機','公司'];

// 從機器類型自動推斷種類
function inferRepairKind(machineType) {
  const t = String(machineType||'').trim().replace(/\s+/g,'');
  if (t==='租送機') return '租送';
  if (t==='買斷'||t==='買 斷') return '買斷';
  if (t==='客人機') return '客人機';
  // 出租中、借用機、待出租、全新機、◎進廠 → 公司
  return '公司';
}

function getRepairPriceItems() {
  const src = cache.repairPricelist||[];
  if (!src.length) return [];
  const nameKey = Object.keys(src[0]).find(k=>k==='名稱'||k==='維修項目'||k==='項目')||Object.keys(src[0])[0]||'';
  return [...new Set(src.map(r=>r[nameKey]).filter(Boolean))];
}

let selectedRepairItems = [];

function toggleRepairItem(item) {
  const idx = selectedRepairItems.indexOf(item);
  if (idx>=0) selectedRepairItems.splice(idx,1); else selectedRepairItems.push(item);
  document.querySelectorAll('#repair-items-wrap .pay-item-chip').forEach(b=>
    b.classList.toggle('selected', selectedRepairItems.includes(b.dataset.item||b.textContent)));
}

function addCustomRepairItem() {
  const inp = document.getElementById('f-repair-item-custom');
  const val = inp?.value.trim(); if (!val) return;
  const custom = JSON.parse(localStorage.getItem('custom_repair_items')||'[]');
  if (!custom.includes(val) && !getRepairPriceItems().includes(val)) {
    custom.push(val); localStorage.setItem('custom_repair_items', JSON.stringify(custom));
  }
  if (!selectedRepairItems.includes(val)) selectedRepairItems.push(val);

function rerenderRepairItemChips() {
  const wrap = document.getElementById('repair-items-wrap'); if (!wrap) return;
  const all = getAllRepairItems();
  wrap.innerHTML = all.map(item=>`<button type="button" class="pay-item-chip${selectedRepairItems.includes(item)?' selected':''}" data-item="${item}" onclick="toggleRepairItem('${item.replace(/'/g,"\\'")}')" oncontextmenu="event.preventDefault();confirmDeleteRepairItem('${item.replace(/'/g,"\\'")}') " ontouchstart="startRepairItemLP('${item.replace(/'/g,"\\'")}') " ontouchend="cancelRepairItemLP()" ontouchmove="cancelRepairItemLP()">${item}</button>`).join('')
    + (all.length===0?'<span style="font-size:0.857em;color:var(--text3)">尚無項目，請在報價表維修分頁新增，或使用下方輸入框</span>':'');
}

function getAllRepairItems() {
  const price = getRepairPriceItems();
  const custom = JSON.parse(localStorage.getItem('custom_repair_items')||'[]');
  return [...new Set([...price, ...custom.filter(i=>!price.includes(i))])];
}

function showRepairItemSuggestions(inp, idx) {
  const listEl = document.getElementById('repair-item-sug-' + idx); if (!listEl) return;

    const hi = q ? m.replace(q, `<mark>${q}</mark>`) : m;

function hideRepairItemSuggestions(idx) {
  const el = document.getElementById('repair-item-sug-' + idx);

}

function selectRepairItemSuggestion(idx, val) {
  const inp = document.querySelector(`[data-repair-item-idx="${idx}"]`);

function showRepairCustomerSuggestions(val) {

function selectRepairCustomer(name) {
  name = name.trim();
  const inp = document.getElementById('f-repair-customer');
  if (inp) inp.value = name;
  const list = document.getElementById('repair-customer-suggestions');
  if (list) list.style.display = 'none';
  // 找該客戶的機器
  const ACTIVE_TYPES = ['出租中','租送機','買斷','買 斷','客人機','借用機'];
  const norm = s => String(s||'').trim().replace(/\s+/g,'');
  const custMachines = cache.machines.filter(m => {
    const typMatch = ACTIVE_TYPES.some(t=>norm(t)===norm(m['類型']||''));
    const custMatch = norm(m['目前客戶']||'')===norm(name) ||
      cache.contracts.some(c=>norm(c['客戶名稱'])===norm(name)&&norm(c['機號'])===norm(m['機號']));
    return typMatch && custMatch;
  });
  const suggestWrap = document.getElementById('repair-machine-suggestions');
  if (suggestWrap) {
    suggestWrap.innerHTML = custMachines.map(m=>{
      const col = REPAIR_KIND_COLOR[inferRepairKind(m['類型'])]||'var(--text2)';
      return `<button type="button" onclick="selectRepairMachine('${(m['機型']||'').replace(/'/g,"\\'")}','${(m['機號']||'').replace(/'/g,"\\'")}','${(m['類型']||'').replace(/'/g,"\\'")}') "

        <span style="font-weight:700">${m['機型']||''}</span>
        <span style="color:var(--text2);margin-left:4px">${m['機號']||''}</span>
        <span style="color:${col};margin-left:6px;font-size:0.786em">${m['類型']||''}</span>
      </button>`;
    }).join('');
  }
  if (custMachines.length === 1) {
    selectRepairMachine(custMachines[0]['機型']||'', custMachines[0]['機號']||'', custMachines[0]['類型']||'');
  }
}

function selectRepairMachine(model, serial, machineType) {
  const modelEl  = document.getElementById('f-repair-model');
  const serialEl = document.getElementById('f-repair-serial');
  if (modelEl)  modelEl.value  = model.trim();
  if (serialEl) serialEl.value = serial.trim();
  selectRepairKind(inferRepairKind(machineType.trim()));
}

async function saveRepair() {
  const statusBtn = document.querySelector('#form-modal-body .pay-m-btn.sel[id^="rs-"]');
  const kindBtn   = document.querySelector('#form-modal-body .pay-m-btn.sel[id^="rk-"]');
  const status    = statusBtn ? statusBtn.textContent.trim() : (_repairStatus||'待維修');
  const kind      = kindBtn   ? kindBtn.textContent.trim()   : (_repairKind||'');
  const dateVal   = document.getElementById('f-repair-date')?.value.replace(/-/g,'/')||'';
  const customer  = document.getElementById('f-repair-customer')?.value.trim()||'';
  const model     = document.getElementById('f-repair-model')?.value.trim()||'';
  const serial    = document.getElementById('f-repair-serial')?.value.trim()||'';
  const customItem= document.getElementById('f-repair-item-custom')?.value.trim()||'';
  if (customItem && !selectedRepairItems.includes(customItem)) selectedRepairItems.push(customItem);
  const itemValues = getRepairItemValues();
  const items = itemValues.join('、');
  const note      = document.getElementById('f-repair-note')?.value.trim()||'';
  // 客戶名稱或機型至少填一項
  if (!customer && !model && !serial) { showToast('請填寫客戶名稱或機型機號'); return; }
  if (!cache.repairs) cache.repairs = [];
  const data = {
    '狀態': status, '種類': kind, '紀錄日期': dateVal,
    '客戶名稱': customer, '機型': model, '機號': serial,
    '維修項目': items, '備註': note,
    '完成日期': status === '已完成'
      ? (editMode && (cache.repairs.find(r=>String(r['維修ID']||'')===String(editId))?.['完成日期']) || new Date().toISOString().substring(0,10).replace(/-/g,'/'))
      : '',
  };
  if (!editMode) data['維修ID'] = 'R'+Date.now().toString(36).toUpperCase();
  if (editMode) {
    const idx = cache.repairs.findIndex(r=>String(r['維修ID']||'')===String(editId));
    if (idx>=0) Object.assign(cache.repairs[idx], data); else cache.repairs.push(data);
    enqueue({action:'update', sheet:'repairs', data, id:editId});
  } else {
    cache.repairs.push(data);
    enqueue({action:'add', sheet:'repairs', data, id: data['維修ID']||null});
  }
  saveCache();
  closeModal('form-modal');
  renderPage();
  showToast(editMode?'已更新維修紀錄':'已新增維修紀錄');
  selectedRepairItems=[];
  editMode=false; editId='';
  setTimeout(()=>{ isSaving=false; },300);
}

let plSelections = {};

const PL_ICE_TYPES    = ['角冰','衛生冰','半月冰','圓帽冰','碎冰'];
const PL_CAPACITY     = ['100磅','200磅','400磅','600磅','800磅','1000磅'];
const PL_VOLTAGES     = ['110V','220V','3∅220V'];
const PL_COOLING      = ['水冷','氣冷','氣水冷'];
const PL_COOLANTS     = ['R404a','R134a','R408a','R452a'];

function getPlOpts(key) {
  const defaults = { pl_icetypes: PL_ICE_TYPES, pl_capacity: PL_CAPACITY, pl_voltages: PL_VOLTAGES, pl_cooling: PL_COOLING, pl_coolants: PL_COOLANTS };
  const custom  = JSON.parse(localStorage.getItem('custom_'+key)||'[]');
  const deleted = JSON.parse(localStorage.getItem('del_pl_'+key)||'[]');
  const arr = [...new Set([...(defaults[key]||[]), ...custom])].filter(v=>!deleted.includes(v));
  // 套用自訂排序
  const order = JSON.parse(localStorage.getItem('order_pl_'+key)||'null');
  if (!order) return arr;
  const ordered = order.filter(o=>arr.includes(o));
  const rest = arr.filter(o=>!ordered.includes(o));
  return [...ordered, ...rest];
}

function selectPlChip(field, val, groupId) {
  plSelections[field] = val;
  document.querySelectorAll(`#${groupId} .pl-chip`).forEach(b=>b.classList.toggle('selected', b.dataset.val===val));
}

function renderPlChipGroup(groupId, field, key) {
  const wrap = document.getElementById(groupId); if (!wrap) return;
  const opts = getPlOpts(key);
  const sel  = plSelections[field]||'';
  wrap.innerHTML = opts.map(o=>`<button type="button" class="pl-chip pay-item-chip${sel===o?' selected':''}" data-val="${o}" onclick="selectPlChip('${field}','${o}','${groupId}')">${o}</button>`).join('')
    || '<span style="font-size:0.857em;color:var(--text3)">尚無選項</span>';
}

let _plEditorState = {};
function openPlChipEditor(groupId, field, key, placeholder) {
  _plEditorState = { groupId, field, key, placeholder };
  _chipEditorState = {}; // 清除 machine 狀態
  renderPlChipEditorDeck();
  document.getElementById('chip-editor-deck').classList.add('open');
}

function renderPlChipEditorDeck() {
  const {groupId, field, key, placeholder} = _plEditorState;
  const opts = getPlOpts(key);
  const title = document.getElementById('chip-editor-title');
  const body  = document.getElementById('chip-editor-body');
  const labels = { pl_icetypes:'冰型', pl_capacity:'產能', pl_voltages:'電壓', pl_cooling:'散熱', pl_coolants:'冷媒' };
  if (title) title.textContent = '編輯選項：' + (labels[key]||field);
  body.innerHTML = `
    <div style="padding:12px 16px;display:flex;gap:8px;border-bottom:1px solid var(--border)">
      <input class="fi" id="pl-editor-inp" placeholder="${placeholder||'新增選項...'}" style="flex:1;font-size:0.929em">
      <button type="button" onclick="addPlChipEditorOption()"
        style="padding:10px 14px;background:var(--accent2);border:none;border-radius:8px;color:#fff;font-size:0.929em;cursor:pointer;white-space:nowrap;font-family:inherit">＋ 新增</button>
    </div>
    <div style="padding:8px 0">
      ${opts.length ? opts.map((o,i)=>`
        <div style="display:flex;align-items:center;padding:9px 16px;border-bottom:1px solid var(--border);gap:8px">
          <div style="display:flex;flex-direction:column;gap:2px;flex-shrink:0">
            <button type="button" onclick="movePlChipOption(${i},-1)"
              ${i===0?'disabled style="opacity:.25"':''}
              style="background:none;border:1px solid var(--border);border-radius:4px;padding:2px 6px;font-size:0.75em;cursor:pointer;color:var(--text2);font-family:inherit;line-height:1">▲</button>
            <button type="button" onclick="movePlChipOption(${i},1)"
              ${i===opts.length-1?'disabled style="opacity:.25"':''}
              style="background:none;border:1px solid var(--border);border-radius:4px;padding:2px 6px;font-size:0.75em;cursor:pointer;color:var(--text2);font-family:inherit;line-height:1">▼</button>
          </div>
          <span style="flex:1;font-size:0.929em">${o}</span>
          <button type="button" onclick="deletePlChipEditorOption('${o.replace(/'/g,"\\'")}')"
            style="background:var(--danger-bg);border:1px solid rgba(229,57,53,.3);color:var(--danger2);border-radius:6px;padding:4px 10px;font-size:0.857em;cursor:pointer;white-space:nowrap;font-family:inherit">✕</button>
        </div>`).join('')
      : '<div style="padding:20px;text-align:center;color:var(--text3);font-size:0.857em">尚無選項，請新增</div>'}
    </div>`;
}

function movePlChipOption(idx, dir) {
  const {groupId, field, key} = _plEditorState;
  const opts = getPlOpts(key);
  const newIdx = idx + dir;
  if (newIdx < 0 || newIdx >= opts.length) return;
  let order = JSON.parse(localStorage.getItem('order_pl_'+key)||'null') || opts;
  opts.forEach(o=>{ if(!order.includes(o)) order.push(o); });
  order = order.filter(o=>opts.includes(o));
  [order[idx], order[newIdx]] = [order[newIdx], order[idx]];
  localStorage.setItem('order_pl_'+key, JSON.stringify(order));
  renderPlChipGroup(groupId, field, key);
  renderPlChipEditorDeck();
}

function addPlChipEditorOption() {
  const inp = document.getElementById('pl-editor-inp');
  const val = inp?.value.trim(); if (!val) return;
  const {groupId, field, key} = _plEditorState;
  // 從黑名單移除（讓刪掉的可以重新加回）
  const del = JSON.parse(localStorage.getItem('del_pl_'+key)||'[]');
  localStorage.setItem('del_pl_'+key, JSON.stringify(del.filter(x=>x!==val)));
  const custom = JSON.parse(localStorage.getItem('custom_'+key)||'[]');
  if (!custom.includes(val)) { custom.push(val); localStorage.setItem('custom_'+key, JSON.stringify(custom)); }
  if (inp) inp.value = '';
  renderPlChipGroup(groupId, field, key);
  renderPlChipEditorDeck();
  showToast(`已新增「${val}」`);
}

function deletePlChipEditorOption(val) {
  if (!confirm(`刪除「${val}」嗎？`)) return;
  const {groupId, field, key} = _plEditorState;
  const custom = JSON.parse(localStorage.getItem('custom_'+key)||'[]');
  localStorage.setItem('custom_'+key, JSON.stringify(custom.filter(x=>x!==val)));
  const del = JSON.parse(localStorage.getItem('del_pl_'+key)||'[]');
  if (!del.includes(val)) { del.push(val); localStorage.setItem('del_pl_'+key, JSON.stringify(del)); }
  if (plSelections[field]===val) plSelections[field]='';
  renderPlChipGroup(groupId, field, key);
  renderPlChipEditorDeck();
  showToast(`已刪除「${val}」`);
}

// 讓 chip-editor-deck 根據來源（machine or pricelist）呼叫正確的 render
function _reopenChipEditorDeck() {
  if (_plEditorState.key) renderPlChipEditorDeck();
  else if (_chipEditorState.groupId) renderChipEditorDeck();
}

function togglePlVoltage(val, groupId) {
  if (!window._plVoltages) window._plVoltages = [];
  const idx = window._plVoltages.indexOf(val);
  if (idx >= 0) window._plVoltages.splice(idx, 1);

function togglePlDiscontinued() {
  const val = document.getElementById('f-pl-discontinued-val');

function selectMaterialStatus(s) {
  document.getElementById('f-mat-status').value = s;

async function savePricelistEntry() {
  isSaving = true;
  let data = {}, sheet = '', idKey = '報價ID';
  if (priceTab === 0) {
    const brandSel = document.getElementById('f-pl-brand');
    const brand = brandSel?.value==='__new__' ? document.getElementById('f-pl-brand-custom')?.value.trim() : brandSel?.value;
    const model = document.getElementById('f-pl-model')?.value.trim();
    if (!brand||!model) { showToast('請填寫廠牌和機型'); isSaving=false; return; }
    // 加入自訂廠牌
    if (brandSel?.value==='__new__' && brand) {
      const cb=JSON.parse(localStorage.getItem('custom_brands')||'[]');
      if(!cb.includes(brand)){cb.push(brand);localStorage.setItem('custom_brands',JSON.stringify(cb));}
    }
    data = {
      '廠牌':brand,'機型':model,
      '租金':document.getElementById('f-pl-rent')?.value||'',
      '租送 租金':document.getElementById('f-pl-send-rent')?.value||'',
      '租送 押金':document.getElementById('f-pl-send-deposit')?.value||'',
      '售價':document.getElementById('f-pl-price')?.value||'',
      '冰型':plSelections['iceType']||'',
      '產能':plSelections['capacity']||'',
      '電壓':(window._plVoltages||[]).filter(Boolean).join('/'),
      '散熱':plSelections['cooling']||'',
      '冷媒':plSelections['coolant']||'',
      '備註':document.getElementById('f-pl-note')?.value||'',
      '停售':document.getElementById('f-pl-discontinued-val')?.value||'',
    };
    sheet='pricelist'; idKey='機型';
    if (!cache.pricelist) cache.pricelist=[];
    if (editMode) {
      const idx=cache.pricelist.findIndex(r=>r['廠牌']===editId.split('|')[0]&&r['機型']===editId.split('|')[1]);
      if(idx>=0) Object.assign(cache.pricelist[idx],data); else cache.pricelist.push(data);
      enqueue({action:'update',sheet,data,id:editId});
    } else {
      cache.pricelist.push(data);
      enqueue({action:'add',sheet,data,id:null});
    }
  } else {
    const inputs = document.querySelectorAll('[data-pl-key]');
    inputs.forEach(inp=>{ data[inp.dataset.plKey] = inp.value.trim(); });
    // 兩個分頁都有狀態欄位
    const matStatus = document.getElementById('f-mat-status')?.value||'';
    if (matStatus) data['狀態'] = matStatus;
    sheet = priceTab===1?'materials':'repairPricelist';
    const arr = priceTab===1?cache.materials:cache.repairPricelist;
    if(!arr) { priceTab===1?(cache.materials=[]):(cache.repairPricelist=[]); }
    if (editMode) {
      const id = editId;
      const arr2 = priceTab===1?cache.materials:cache.repairPricelist;
      // 先確保 data 有 ID
      data['報價ID'] = id;
      const idx = arr2.findIndex(r=>String(r['報價ID']||r[Object.keys(r)[0]]||'')===String(id));
      if(idx>=0) Object.assign(arr2[idx], data);
      enqueue({action:'update', sheet, data, id});
    } else {
      data['報價ID']='P'+Date.now().toString(36).toUpperCase();
      (priceTab===1?cache.materials:cache.repairPricelist).push(data);
      enqueue({action:'add', sheet, data, id: data['報價ID']});
    }
  }
  saveCache();
  closeModal('form-modal');
  renderPage();
  showToast(editMode?'已更新報價':'已新增報價');
  editMode=false; editId='';
  setTimeout(()=>{ isSaving=false; },300);
}

const MATERIAL_STATUS_BG    = { '有現貨':'var(--green-bg)', '缺貨':'var(--danger-bg)', '已停售':'var(--blue-bg)' };

function materialStatusChip(s) {
  const c  = MATERIAL_STATUS_COLOR[s]||'var(--text2)';
  const bg = MATERIAL_STATUS_BG[s]||'rgba(255,255,255,.07)';
  return s ? `<span style="display:inline-flex;align-items:center;padding:2px 9px;border-radius:99px;font-size:0.786em;font-weight:700;background:${bg};color:${c}">${s}</span>` : '';
}

function renderPriceList() {
  const role = authState?.role;
  const isAdmin = role === 'admin';
  const tabs = ['製冰機','材料','維修'];
  const tabHtml = `<div class="task-tabs" style="margin-bottom:0">
    ${tabs.map((t,i)=>`<div class="task-tab${priceTab===i?' active':''}" onclick="setPriceTab(${i})">${t}</div>`).join('')}
  </div>`;

  let list = [], html = '';

  if (priceTab === 0) {
    list = [...(cache.pricelist||[])];
    if (searchQuery) list = list.filter(r=>JSON.stringify(r).includes(searchQuery));
    if (!list.length) return tabHtml+'<div class="empty">沒有製冰機報價資料</div>';
    // 依全新庫存數量排序（多→少）
    const countNew  = r => { const b=(r['廠牌']||'').trim(); const m=(r['機型']||'').trim(); return cache.machines.filter(mc=>(!b||(mc['廠牌']||'').trim()===b)&&(!m||(mc['機型']||'').trim()===m)&&String(mc['類型']||'').trim()==='全新機').length; };
    const countRent = r => { const b=(r['廠牌']||'').trim(); const m=(r['機型']||'').trim(); return cache.machines.filter(mc=>(!b||(mc['廠牌']||'').trim()===b)&&(!m||(mc['機型']||'').trim()===m)&&String(mc['類型']||'').trim()==='待出租').length; };
    list.sort((a,b)=>{ const dn=countNew(b)-countNew(a); return dn!==0?dn:countRent(b)-countRent(a); });
    html = list.map((r,i)=>{
      const realIdx = (cache.pricelist||[]).indexOf(r);
      // 副標題：租金 + 售價
      const rentStr  = r['租金']  ? `租金 NT$${Number(r['租金']).toLocaleString()}` : '';
      const priceStr = r['售價']  ? `售價 NT$${Number(r['售價']).toLocaleString()}` : '';
      const sub = [rentStr, priceStr].filter(Boolean).join(' · ');
      // 靠右：庫存數量（全新機、待出租）
      const brand = r['廠牌']||''; const model = r['機型']||'';
      const isStopped = r['停售']==='是';
      const matchMachine = m => {
        const mb = (m['廠牌']||'').trim(); const mm = (m['機型']||'').trim();
        return (!brand||mb===brand) && (!model||mm===model);
      };
      const newCount    = cache.machines.filter(m=>matchMachine(m)&&String(m['類型']||'').trim()==='全新機').length;
      const rentCount   = cache.machines.filter(m=>matchMachine(m)&&String(m['類型']||'').trim()==='待出租').length;
      return `<div class="customer-item" onclick="showPricelistDetail(${realIdx})" style="${isStopped?'opacity:.55':''}">
        <div style="flex:1;min-width:0">
          <div class="c-name" style="display:flex;align-items:center;gap:6px">
            ${brand} ${model}
            ${isStopped?'<span style="font-size:0.714em;font-weight:700;color:var(--danger2);background:var(--danger-bg);border-radius:4px;padding:1px 6px">停售</span>':''}
          </div>
          ${sub?`<div class="c-addr">${sub}</div>`:''}
        </div>
        <div style="text-align:right;flex-shrink:0;margin-left:10px">
          ${newCount>0?`<div style="font-size:0.786em;color:var(--purple-bg)"><span style="color:#ce93d8;font-weight:700">${newCount}</span> <span style="color:var(--text3)">全新</span></div>`:''}
          ${rentCount>0?`<div style="font-size:0.786em;color:var(--text3)"><span style="color:var(--red2);font-weight:700">${rentCount}</span> 待租</div>`:''}
          ${newCount===0&&rentCount===0?`<div style="font-size:0.786em;color:var(--text3)">無庫存</div>`:''}
        </div>
      </div>`;
    }).join('');

  } else if (priceTab === 1) {
    list = [...(cache.materials||[])];
    if (searchQuery) list = list.filter(r=>JSON.stringify(r).includes(searchQuery));
    if (!list.length) return tabHtml+'<div class="empty">沒有材料報價資料</div>';
    html = list.map((r,i)=>{
      const realIdx = (cache.materials||[]).indexOf(r);
      const name   = r['名稱']||Object.values(r)[0]||'—';
      const price  = r['價格']||r['單價']||'';
      const stock  = r['庫存']||'';
      const status = r['狀態']||'';
      const note   = r['附註']||r['備註']||'';
      const subParts = [stock?`庫存：${stock}`:'', note].filter(Boolean).join('  ');
      return `<div class="customer-item" onclick="showPricelistDetail(${realIdx})">
        <div style="flex:1;min-width:0">
          <div class="c-name" style="display:flex;align-items:center;gap:6px">
            ${name}
            ${materialStatusChip(status)}
          </div>
          ${subParts?`<div class="c-addr">${subParts}</div>`:''}
        </div>
        ${price?`<div style="font-size:0.929em;font-weight:700;color:var(--green2);flex-shrink:0;margin-left:10px">NT$${Number(price).toLocaleString()}</div>`:''}
      </div>`;
    }).join('');

  } else {
    list = [...(cache.repairPricelist||[])];
    if (searchQuery) list = list.filter(r=>JSON.stringify(r).includes(searchQuery));
    if (!list.length) return tabHtml+'<div class="empty">沒有維修報價資料</div>';
    html = list.map((r,i)=>{
      const realIdx = (cache.repairPricelist||[]).indexOf(r);
      const name   = r['名稱']||Object.values(r)[0]||'—';
      const price  = r['價格']||r['單價']||'';
      const stock  = r['庫存']||'';
      const status = r['狀態']||'';
      const note   = r['附註']||r['備註']||'';
      const subParts = [stock?`庫存：${stock}`:'', note].filter(Boolean).join('  ');
      return `<div class="customer-item" onclick="showPricelistDetail(${realIdx})">
        <div style="flex:1;min-width:0">
          <div class="c-name" style="display:flex;align-items:center;gap:6px">
            ${name}
            ${materialStatusChip(status)}
          </div>
          ${subParts?`<div class="c-addr">${subParts}</div>`:''}
        </div>
        ${price?`<div style="font-size:0.929em;font-weight:700;color:var(--green2);flex-shrink:0;margin-left:10px">NT$${Number(price).toLocaleString()}</div>`:''}
      </div>`;
    }).join('');
  }

  return tabHtml + `<div style="padding-bottom:80px">${html}</div>`;
}

function setPriceTab(i) { priceTab = i; renderPage(); }

function showPricelistDetail(idx) {
  const sources = [cache.pricelist, cache.materials, cache.repairPricelist];
  const item = (sources[priceTab]||[])[idx];
  if (!item) return;
  const keys = Object.keys(item).filter(k=>k&&String(k).trim());
  const body = document.getElementById('detail-modal-body');
  const titles = ['製冰機報價','材料報價','維修報價'];
  document.getElementById('detail-modal-title').textContent = titles[priceTab];
  const isAdmin = authState?.role === 'admin';
  document.getElementById('detail-edit-btn').style.display = isAdmin ? '' : 'none';
  detailType = 'pricelist'; detailIdx = idx;

  let rowHtml = '';

  if (priceTab === 0) {
    // 製冰機：特殊彩色大字排版
    const isStopped = item['停售'] === '是';
    const fmt = (v) => v ? `NT$${Number(v).toLocaleString()}` : '—';
    const bigRow = (label, val, color, extra='') =>
      val ? `<div class="det-row" style="padding:8px 0">
        <span class="det-key">${label}</span>
        <span style="font-size:1.143em;font-weight:700;color:${color}">${val}${extra}</span>
      </div>` : '';
    const normalRow = (label, val) =>
      val ? `<div class="det-row"><span class="det-key">${label}</span><span class="det-val">${val}</span></div>` : '';

    rowHtml = `
      ${isStopped?`<div style="padding:10px 0;text-align:center">
        <span style="font-size:1.2em;font-weight:900;color:var(--danger2);letter-spacing:2px">⚠ 已停售</span>
      </div>`:''}
      <div class="det-sec-title" style="margin-top:4px">基本資訊</div>
      ${normalRow('廠牌', item['廠牌'])}
      ${normalRow('機型', item['機型'])}
      ${normalRow('冰型', item['冰型'])}
      ${normalRow('產能', item['產能']||item['磅數'])}
      ${normalRow('電壓', item['電壓'])}
      ${normalRow('散熱', item['散熱'])}
      ${normalRow('冷媒', item['冷媒'])}
      <div class="det-sec-title" style="margin-top:12px">租賃價格</div>
      ${bigRow('租金', fmt(item['租金']), 'var(--green2)')}
      ${bigRow('租送租金', fmt(item['租送 租金']||item['租送租金']), '#ffde87')}
      ${bigRow('租送押金', fmt(item['租送 押金']||item['租送押金']), '#ffde87')}
      ${bigRow('售價', fmt(item['售價']), 'var(--blue2)')}
      ${normalRow('備註', item['備註'])}`;
  } else {
    // 材料/維修：通用渲染
    rowHtml = keys.filter(k=>item[k]!==undefined&&item[k]!=='').map(k=>{
      let val = String(item[k]);
      if (k === '狀態' && priceTab === 1) val = materialStatusChip(item[k]) || val;
      return `<div class="det-row"><span class="det-key">${k}</span><span class="det-val">${val}</span></div>`;
    }).join('');
  }

  body.innerHTML = `<div class="det-section">${rowHtml}</div>
  ${isAdmin?`<div style="padding:14px 15px">
    <button class="btn-cancel" style="color:var(--danger2);border-color:var(--border);width:100%" onclick="confirmDeletePricelist(${idx})">🗑 刪除</button>
  </div>`:''}`;
  document.getElementById('detail-modal').classList.add('open');
}

function confirmDeletePricelist(idx) {
  if (!confirm('確定要刪除這筆報價嗎？')) return;
  const sources = [cache.pricelist, cache.materials, cache.repairPricelist];
  const sheetNames = ['pricelist','materials','repairPricelist'];
  const arr = sources[priceTab];
  const item = arr?.[idx];
  if (!item) return;
  const id = item['機型']||item['報價ID']||item[Object.keys(item)[0]]||'';
  arr.splice(idx,1);
  saveCache();
  enqueue({action:'delete', sheet:sheetNames[priceTab], data:null, id});
  closeModal('detail-modal');
  renderPage();
  showToast('已刪除');
}


// ============================================================
// 總覽頁面
// ============================================================
function renderOverview() {
  const role = authState?.role;
  const myName = authState?.name||'';

  // ── 施工紀錄統計 ──
  let tasks = [...cache.tasks];
  if (role !== 'admin') {
    tasks = tasks.filter(t => {
      const assigned = getTaskAssign(t);
      return !assigned.length || assigned.includes(myName);
    });
  }
  const pendingTasks = tasks.filter(t => !isTaskDone(t));
  const todayStr = new Date().toISOString().substring(0,10);
  const doneTasks    = tasks.filter(t => {
    if (!isTaskDone(t)) return false;
    const doneDate = String(t['完成時間']||t['紀錄日期']||'').substring(0,10).replace(/\//g,'-');
    return doneDate === todayStr;
  });

  // ── 維修紀錄統計 ──
  let repairs = [...(cache.repairs||[])];
  const pendingRepairs = repairs.filter(r => (r['狀態']||'待維修') !== '已完成');
  const doneRepairs    = repairs.filter(r => {
    if ((r['狀態']||'') !== '已完成') return false;
    const doneDate = String(r['完成日期']||'').substring(0,10).replace(/\//g,'-');
    return doneDate === todayStr;
  });

  // ── 收租統計（未收款）──
  const today = new Date(new Date().toDateString());
  let contracts = [...cache.contracts].filter(c => {
    const e = String(c['到期日期']||'').replace('T',' ').substring(0,10);
    return !e || new Date(e) >= today;
  });
  if (role !== 'admin') {
    contracts = contracts.filter(c => {
      const h = String(c['經手人']||'').trim();
      return !h || h.split(/[,、，]/).map(s=>s.trim()).includes(myName);
    });
  }
  const unpaidContracts = contracts.filter(c => !isRentPaidThisPeriod(c['合約ID']));

  // ── 待叫貨：材料報價 + 維修報價中狀態為「缺貨」的數量 ──
  const outOfStock = [
    ...(cache.materials||[]),
    ...(cache.repairPricelist||[])
  ].filter(r=>String(r['狀態']||'').trim()==='缺貨');

  // ── 本月收款統計 ──
  const thisMonthStr = new Date().toISOString().substring(0,7); // 'YYYY-MM'
  const thisMonthPayments = cache.payments.filter(p=>{
    const d = String(p['結帳日期']||'').replace(/\//g,'-').substring(0,7);
    return d === thisMonthStr && (Number(p['金額'])||0) > 0;
  });
  const thisMonthPayTotal = thisMonthPayments.reduce((s,p)=>s+(Number(p['金額'])||0), 0);
  // 本月應收租金（已標記已收的）
  const thisMonthRentTotal = cache.contracts
    .filter(c=>isRentPaidThisPeriod(c['合約ID']))
    .reduce((s,c)=>s+(Number(c['租金'])||0), 0);
  const thisMonthTotal = thisMonthPayTotal + thisMonthRentTotal;

  // ── 即將到期合約（3個月內）──
  const in3m = new Date(today); in3m.setMonth(in3m.getMonth()+3);
  const expiringSoon = contracts.filter(c=>{
    const e = String(c['到期日期']||'').replace('T',' ').substring(0,10);
    if (!e) return false;
    const ed = new Date(e);
    return ed >= today && ed <= in3m;
  }).sort((a,b)=>String(a['到期日期']||'').localeCompare(String(b['到期日期']||'')));

  // ── 色卡產生器 ──
  const card = (icon, label, count, color, bgColor, tabIdx, extraHtml='') => `
    <div onclick="switchTab(${tabIdx})" style="
      background:var(--surface);border-radius:14px;padding:18px 16px;
      border:1px solid var(--border);cursor:pointer;position:relative;overflow:hidden;
      display:flex;flex-direction:column;gap:6px;transition:background .1s;
      border-left:4px solid ${color};"
      onpointerdown="this.style.background='var(--surface2)'" onpointerup="this.style.background='var(--surface)'" onpointercancel="this.style.background='var(--surface)'">
      <div style="display:flex;align-items:center;gap:8px;color:var(--text2);font-size:0.857em;font-weight:600">
        <span style="font-size:1.2em">${icon}</span>${label}
      </div>
      <div style="font-size:2.2em;font-weight:900;color:${color};line-height:1">${count}</div>
      ${extraHtml}
      <div style="font-size:0.75em;color:var(--text3);margin-top:2px">點擊查看 →</div>
    </div>`;

  // ── 近期施工紀錄（最新5筆待施工）──
  const recentTasks = pendingTasks
    .sort((a,b) => String(b['紀錄日期']||'').localeCompare(String(a['紀錄日期']||'')))
    .slice(0,5);

  const recentTasksHtml = recentTasks.length ? recentTasks.map(t => {
    const date = String(t['紀錄日期']||'').substring(0,10).replace(/-/g,'/');
    const assigned = getTaskAssign(t);
    return `<div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)"
      onclick="switchTab(2)" style="cursor:pointer">
      <div style="flex:1;min-width:0">
        <div style="font-size:0.929em;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${t['客戶名稱']||'—'}</div>
        <div style="font-size:0.786em;color:var(--text2);margin-top:2px">${t['工作內容']||''}</div>
      </div>
      <div style="text-align:right;flex-shrink:0">
        <div style="font-size:0.786em;color:var(--text3)">${date}</div>
        ${assigned.length?`<div style="font-size:0.714em;color:var(--accent2)">👤 ${assigned.join('、')}</div>`:''}
      </div>
    </div>`;
  }).join('') : `<div style="padding:16px 0;text-align:center;color:var(--text3);font-size:0.857em">沒有待施工項目 🎉</div>`;

  // ── 近期維修紀錄（最新5筆待維修）──
  const recentRepairs = pendingRepairs
    .sort((a,b) => String(b['紀錄日期']||'').localeCompare(String(a['紀錄日期']||'')))
    .slice(0,5);

  const recentRepairsHtml = recentRepairs.length ? recentRepairs.map(r => {
    const date = String(r['紀錄日期']||'').substring(0,10).replace(/-/g,'/');
    const kc = REPAIR_KIND_COLOR[r['種類']||'']||'var(--text2)';
    return `<div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)"
      onclick="switchTab(7)">
      <div style="flex:1;min-width:0">
        <div style="font-size:0.929em;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${r['客戶名稱']||r['機型']||'—'} <span style="font-size:0.857em;color:var(--text2)">${r['機號']||''}</span></div>
        <div style="font-size:0.786em;color:var(--text2);margin-top:2px">${r['維修項目']||''}</div>
      </div>
      <div style="text-align:right;flex-shrink:0">
        <div style="font-size:0.786em;color:var(--text3)">${date}</div>
        ${r['種類']?`<div style="font-size:0.714em;color:${kc}">${r['種類']}</div>`:''}
      </div>
    </div>`;
  }).join('') : `<div style="padding:16px 0;text-align:center;color:var(--text3);font-size:0.857em">沒有待維修項目 🎉</div>`;

  const greeting = (() => {
    const h = new Date().getHours();
    if (h < 12) return '早安';
    if (h < 18) return '午安';
    return '晚安';
  })();
  const userName = authState?.name || '';

  return `<div style="padding:16px 14px 90px;display:flex;flex-direction:column;gap:16px">
    <div style="padding:4px 2px 8px">
      <div style="font-size:1.143em;font-weight:900;color:var(--text)">${greeting}，${userName} 👋</div>
      <div style="font-size:0.857em;color:var(--text3);margin-top:3px">${new Date().toLocaleDateString('zh-TW',{year:'numeric',month:'long',day:'numeric',weekday:'long'})}</div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
      ${card('🔨','待施工', pendingTasks.length, 'var(--accent2)', 'var(--accent-bg)', 2,
        `<div style="font-size:0.786em;color:var(--text3)">已完成 ${doneTasks.length} 筆</div>`)}
      ${card('🔧','待維修', pendingRepairs.length, 'var(--danger2)', 'var(--danger-bg)', 7,
        `<div style="font-size:0.786em;color:var(--text3)">已完成 ${doneRepairs.length} 筆</div>`)}
      ${card('💰','待收租', unpaidContracts.length, 'var(--green2)', 'var(--green-bg)', 4,
        `<div style="font-size:0.786em;color:var(--text3)">共 ${contracts.length} 份合約</div>`)}
      ${card('📦','待叫貨', outOfStock.length, 'var(--yellow)', 'rgba(249,168,37,.1)', 8,
        `<div style="font-size:0.786em;color:var(--text3)">材料/維修報價缺貨</div>`)}
    </div>

    <div onclick="switchTab(3)" style="background:var(--surface);border-radius:14px;border:1px solid var(--border);padding:14px 16px;cursor:pointer;border-left:4px solid var(--green2)"
      onpointerdown="this.style.background='var(--surface2)'" onpointerup="this.style.background='var(--surface)'" onpointercancel="this.style.background='var(--surface)'">
      <div style="font-size:0.786em;font-weight:700;color:var(--text2);margin-bottom:8px">💵 本月收入（${new Date().getMonth()+1}月）</div>
      <div style="display:flex;gap:0">
        <div style="flex:1;border-right:1px solid var(--border);padding-right:12px">
          <div style="font-size:0.714em;color:var(--text3)">收款紀錄</div>
          <div style="font-size:1.2em;font-weight:800;color:var(--green2)">NT$${thisMonthPayTotal.toLocaleString()}</div>
        </div>
        <div style="flex:1;border-right:1px solid var(--border);padding:0 12px">
          <div style="font-size:0.714em;color:var(--text3)">已收租金</div>
          <div style="font-size:1.2em;font-weight:800;color:var(--green2)">NT$${thisMonthRentTotal.toLocaleString()}</div>
        </div>
        <div style="flex:1;padding-left:12px">
          <div style="font-size:0.714em;color:var(--text3)">合計</div>
          <div style="font-size:1.2em;font-weight:800;color:var(--text)">NT$${thisMonthTotal.toLocaleString()}</div>
        </div>
      </div>
      <div style="font-size:0.75em;color:var(--text3);margin-top:6px">點擊查看收款紀錄 →</div>
    </div>

    <div style="background:var(--surface);border-radius:12px;border:1px solid var(--border);overflow:hidden">
      <div style="padding:12px 14px 6px;font-size:0.857em;font-weight:700;color:var(--text2);border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center">
        🔨 待施工紀錄
        <button onclick="switchTab(2)" style="background:none;border:none;color:var(--accent2);font-size:0.857em;cursor:pointer;font-family:inherit">全部 →</button>
      </div>
      <div style="padding:0 14px">${recentTasksHtml}</div>
    </div>

    <div style="background:var(--surface);border-radius:12px;border:1px solid var(--border);overflow:hidden">
      <div style="padding:12px 14px 6px;font-size:0.857em;font-weight:700;color:var(--text2);border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center">

        }).join('')}

  </div>`;
}

async function testConn() {
  const url = cfg.url;
  const el = document.getElementById('s-url');
  if (!url) { showToast('請先填入網址'); return; }
  el.innerHTML = '<div class="s-dot un"></div><span>連線中...</span>';
  try {
    const d = await jsonp(url, {action:'getAll', sheet:'customers'});
    el.innerHTML = `<div class="s-dot ok"></div><span>連線成功！讀到 ${d.length} 筆客戶</span>`;
    showToast('✅ 連線成功，同步中...');
    cache.customers = d || [];
    saveCache();
    await syncAllExcept('customers');
  } catch(e) {
    el.innerHTML = `<div class="s-dot err"></div><span>失敗：${e.message}</span>`;
    showToast('❌ 失敗：'+e.message);
  }
}

function clearAllCache() {
  cache = {customers:[],machines:[],contracts:[],payments:[],pricelist:[],staff:[],tasks:[],taskOptions:[],adminPin:'',machineStatuses:[],repairs:[],materials:[],repairPricelist:[]};
  saveCache(); renderPage(); showToast('快取已清除');
}

  return '<div class="empty">沒有資料</div>';
}

function showDetail(type, idx) {
  detailType = type; detailIdx = idx;
  document.getElementById('detail-edit-btn').style.display = '';
  const maps = {customer:cache.customers, machine:cache.machines, contract:cache.contracts, payment:cache.payments, task:cache.tasks};
  const item = maps[type]?.[idx];
  if (!item) return;
  const title = document.getElementById('detail-modal-title');
  const body  = document.getElementById('detail-modal-body');

  // task detail
  if (type === 'task') {
    document.getElementById('detail-edit-btn').style.display = ''; // 顯示編輯按鈕
    title.textContent = item['客戶名稱']||'施工紀錄';
    const fields = [
      {k:'客戶名稱', v: item['客戶名稱']||'—'},
      {k:'電話',     v: item['電話']||'—'},
      {k:'地址',     v: item['地址']||'—'},
      {k:'工作內容', v: item['工作內容']||'—', big:true},
      {k:'機型',     v: item['機型']||''},
      {k:'機號',     v: item['機號']||''},
      {k:'備註',     v: item['備註']||'—'},
      {k:'希望施工時間', v: item['希望施工時間']||'—'},
      {k:'紀錄日期', v: String(item['紀錄日期']||'').substring(0,10)},
    ].filter(f=>f.v&&f.v!=='—'||f.big);

    // 找該客戶的機器
    const custName = item['客戶名稱']||'';
    const custMachines = cache.machines.filter(m => String(m['目前客戶']||'').trim()===custName.trim());
    const custContracts = cache.contracts.filter(c => String(c['客戶名稱']||'').trim()===custName.trim());
    const contractMachineNos = custContracts.map(c=>String(c['機號']||'').trim()).filter(Boolean);
    const contractMachines = cache.machines.filter(m=>contractMachineNos.includes(String(m['機號']||'').trim()) && !custMachines.includes(m));
    const SHOW_TYPES = ['出租中','租送機','買斷','買 斷','客人機','借用機'];
    const normT = s => String(s||'').trim().replace(/\s+/g,'');
    const allCustMachines = [...custMachines, ...contractMachines]
      .filter(m => SHOW_TYPES.some(t => normT(t)===normT(m['類型']||'')));

    const machineBlock = allCustMachines.length ? `
      <div class="det-section" style="margin-top:8px">
        <div style="font-size:0.857em;font-weight:700;color:var(--text2);margin-bottom:8px;padding:0 2px">📦 客戶機器</div>
        ${allCustMachines.map(m=>{
          const typ = String(m['類型']||'').trim().replace(/\s+/g,'');
          const color = typ==='出租中'?'var(--green2)':typ==='租送機'?'#ffde87':typ==='客人機'?'var(--blue2)':typ==='買斷'||typ==='買 斷'?'var(--orange)':'var(--text2)';
          const ownership = (typ==='客人機'||typ==='買斷'||typ==='買 斷') ? '自有' : typ==='出租中'?'租賃中':typ==='租送機'?'租送中':'其他';
          return `<div class="det-row" style="align-items:flex-start">
            <span class="det-key">${m['機型']||''} ${m['機號']||''}</span>
            <span class="det-val" style="text-align:right">
              <span style="font-size:0.857em;font-weight:700;color:${color}">${m['類型']||''}</span>
              <span style="font-size:0.786em;color:var(--text3);margin-left:4px">${ownership}</span>
            </span>
          </div>`;
        }).join('')}
      </div>` : '';

    body.innerHTML = `
      <div class="det-section">
        ${fields.map(f=>`<div class="det-row">
          <span class="det-key">${f.k}</span>
          <span class="det-val" style="${f.big?'font-size:15px;font-weight:700':''}">${f.v}</span>
        </div>`).join('')}
      </div>
      ${machineBlock}
      <div style="padding:14px 15px;display:flex;gap:8px">
        <button class="btn-cancel" style="flex:1;color:var(--danger2)" onclick="confirmDelete('task',${idx})">🗑 刪除</button>
        <button class="btn-save" style="flex:1" onclick="toggleTaskDone(${idx});closeModal('detail-modal')">${isTaskDone(item)?'↩ 取消完成':'✓ 標記完成'}</button>
      </div>`;
    document.getElementById('detail-modal').classList.add('open');
    return;
  }

  if (type === 'customer') {
    title.textContent = item['客戶名稱']||'客戶資料';
    const today = new Date(new Date().toDateString());
    const allContracts = cache.contracts.filter(c=>c['客戶名稱']===item['客戶名稱']);
    // 只顯示未到期合約
    const activeContracts = allContracts.filter(ct=>{
      const endStr = String(ct['到期日期']||'').replace('T',' ').substring(0,10);
      if (!endStr) return true; // 沒有到期日期就顯示
      return new Date(endStr) >= today;
    });
    // 擁有の機器：買斷、客人機（用所有欄位模糊比對），以及已到期的租送機
    const customerName = item['客戶名稱'];
    // 正規化字串：去除空格、統一全半形
    const normalize = s => String(s||'').trim().replace(/\s+/g,'').replace(/　/g,'');
    const normCustomer = normalize(customerName);

    // 類型比對也去空格
    const matchType = (typ, target) => normalize(typ) === normalize(target);

    const ownedMachines = cache.machines.filter(m => {
      const typ = m['類型']||'';
      const normTyp = normalize(typ);

      const isBuyout   = normTyp === '買斷';
      const isCustomer = normTyp === '客人機';
      const isRentSend = normTyp === '租送機';

      if (!isBuyout && !isCustomer && !isRentSend) return false;

      // 用所有欄位的值來比對客戶名稱
      const machineVals = Object.values(m).map(v => normalize(v));
      const isThisCustomer = machineVals.some(v => v === normCustomer) ||
        cache.contracts.some(c =>
          normalize(c['機號']) === normalize(m['機號']) &&
          normalize(c['客戶名稱']) === normCustomer
        );

      if (isBuyout || isCustomer) return isThisCustomer;
      if (isRentSend) return isThisCustomer && isMachineExpired(m);
      return false;
    });
    // 客戶註記：優先抓「客戶註記」欄位，其次備註
    const note = item['客戶註記']||item['客戶備註']||item['備註']||'';
    // 多電話解析
    const phones = item['電話'] ? item['電話'].split(/[\/、,]/).map(p=>p.trim()).filter(Boolean) : [];
    const phoneHtml = phones.length

          <a href="tel:${p}" style="background:var(--green-bg);color:var(--green2);border:1px solid rgba(67,160,71,.3);border-radius:6px;padding:3px 10px;font-size:11px;text-decoration:none;white-space:nowrap">📞 撥打</a>
        </div>`).join('')
      : '<span style="color:var(--text3)">—</span>';
    body.innerHTML = `

        ${item['負責人']?`<div class="det-row"><span class="det-key">負責人</span><span class="det-val">${item['負責人']}</span></div>`:''}
        ${item['負責人 資訊']||item['負責人資訊']?`<div class="det-row" style="align-items:flex-start"><span class="det-key">負責人資訊</span><span class="det-val" style="font-size:12px;white-space:pre-wrap">${item['負責人 資訊']||item['負責人資訊']}</span></div>`:''}
        ${note?`<div class="det-row"><span class="det-key">客戶註記</span><span class="det-val" style="color:var(--yellow)">${note}</span></div>`:''}
      </div>
      <div class="det-section">
        <div class="det-sec-title" style="display:flex;justify-content:space-between;align-items:center">
          租賃合約${activeContracts.length?`（${activeContracts.length}筆）`:''}
          <button onclick="openAddMachineForCustomer('${item['客戶名稱'].replace(/'/g,"&apos;")}')" style="background:var(--accent-bg);border:1px solid var(--accent-glow);color:var(--accent2);border-radius:6px;padding:4px 10px;font-size:11px;font-family:inherit;cursor:pointer">＋機器</button>

        ${activeContracts.length ? activeContracts.map(ct=>{
          const endStr = String(ct['到期日期']||'').replace('T',' ').substring(0,10);

      </div>
      ${ownedMachines.length ? `<div class="det-section">
        <div class="det-sec-title">擁有の機器</div>
        ${ownedMachines.map(m=>{

      })()}

        <button class="btn-cancel" style="width:100%;color:var(--danger2)" onclick="confirmDelete('customer',${idx})">🗑 刪除</button>
      </div>`;

function openStatusDeck(machineIdx) {
  const statuses = ['待出租','出租中','租送機','全新機','客人機','買斷','◎進廠','借用機'];
  const dotColor = {
    'red':'var(--red2)', 'green':'var(--green2)', 'yellow':'var(--yellow)',
    'orange':'var(--orange)', 'blue':'var(--blue2)', 'purple':'#ce93d8',
    'white':'var(--text)', 'gray':'var(--text3)', 'teal':'#26a69a'
  };
  const body = document.getElementById('status-deck-body');
  body.innerHTML = statuses.map(s => {
    const col = getChipColor(s)||'gray';
    const bg = dotColor[col] || 'var(--text3)';
    return `<div class="status-opt" onclick="changeMachineStatus(${machineIdx},'${s}')">
      <div class="status-opt-dot" style="background:${bg}"></div>
      <span class="status-opt-label">${s}</span>
    </div>`;
  }).join('');
  document.getElementById('status-deck').classList.add('open');
}

async function changeMachineStatus(machineIdx, newStatus) {
  closeModal('status-deck');
  const m = cache.machines[machineIdx];
  if (!m) return;
  const oldStatus = String(m['類型']||'').trim().replace(/\s+/g,'');
  const norm = s => String(s||'').trim().replace(/\s+/g,'');

  // === 情況1：從「出租中」改為其他狀態 → 要求填寫到期日期，同步租賃紀錄 ===
  if (norm(oldStatus) === '出租中' && norm(newStatus) !== '出租中') {
    closeModal('detail-modal');
    showEndDateDeck(machineIdx, newStatus);
    return;
  }

  // === 情況2：改為「出租中」或「租送機」→ 新增合約 ===
  if (norm(newStatus) === '出租中' || norm(newStatus) === '租送機') {
    closeModal('detail-modal');
    openContractFromStatus(machineIdx, newStatus);
    return;
  }

  // === 情況3：改為「買 斷」→ 新增收款 ===
  if (norm(newStatus) === '買斷') {
    closeModal('detail-modal');
    openPaymentFromStatus(machineIdx);
    return;
  }

  // === 其他狀態：直接更新 ===
  m['類型'] = newStatus;
  saveCache();
  enqueue({ action:'update', sheet:'machines', data: m, id: m['機號'] });
  showDetail('machine', machineIdx);
  renderPage();
  showToast('狀態已更新：' + newStatus);
}

// 顯示填寫到期日期的 deck（從出租中改為其他）
function showEndDateDeck(machineIdx, newStatus) {
  const m = cache.machines[machineIdx];
  const body = document.getElementById('status-deck-body');
  body.innerHTML = `
    <div style="padding:16px;display:flex;flex-direction:column;gap:14px">
      <div style="font-size:13px;color:var(--text2)">將 <b style="color:var(--text)">${m['機型']} ${m['機號']}</b> 從「出租中」改為「${newStatus}」<br>請填寫租賃到期日期以同步租賃紀錄：</div>
      <div class="ff"><label>到期日期<span class="req">*</span></label>
        <input class="fi" id="end-date-input" type="date" value="${new Date().toISOString().split('T')[0]}">
      </div>
      <button class="btn-save" onclick="confirmEndDate(${machineIdx},'${newStatus}')">確認</button>
      <button class="btn-cancel" onclick="closeModal('status-deck')">取消</button>
    </div>`;
  document.getElementById('status-deck').classList.add('open');
}

async function confirmEndDate(machineIdx, newStatus) {
  const endVal = document.getElementById('end-date-input')?.value;
  if (!endVal) { showToast('請填寫到期日期'); return; }
  closeModal('status-deck');
  const m = cache.machines[machineIdx];

  // 更新機器狀態
  m['類型'] = newStatus;
  saveCache();
  enqueue({ action:'update', sheet:'machines', data: m, id: m['機號'] });

  // 找到對應的最新租賃合約，更新到期日期和狀態
  const contracts = cache.contracts
    .filter(c => c['機號'] === m['機號'])
    .sort((a,b) => String(b['租借日期']||'').localeCompare(String(a['租借日期']||'')));
  if (contracts.length > 0) {
    const ct = contracts[0];
    ct['到期日期'] = endVal.replace(/-/g,'/');
    ct['類型'] = '已到期';
    saveCache();
    enqueue({ action:'update', sheet:'contracts', data: ct, id: ct['合約ID'] });
    showToast('已更新狀態及租賃紀錄到期日');
  } else {
    showToast('狀態已更新（未找到對應合約）');
  }
  renderPage();
}

// 從狀態更改→新增合約（出租中/租送機）
function openContractFromStatus(machineIdx, newStatus) {
  const m = cache.machines[machineIdx];
  const contractType = String(newStatus).trim().replace(/\s+/g,'') === '租送機' ? '租送機' : '出租中';
  // 從價目表抓租金押金
  const priceRow = cache.pricelist.find(p => p['廠牌']===m['廠牌'] && p['機型']===m['機型']);
  let rent = 0, deposit = 0;
  if (priceRow) {
    if (contractType === '租送機') {
      rent    = Number(priceRow['租送 租金']||priceRow['租送租金']||priceRow['租金']||0);
      deposit = Number(priceRow['租送 押金']||priceRow['租送押金']||priceRow['押金']||0);
    } else {
      rent    = Number(priceRow['租金']||0);
      deposit = rent * 2;
    }
  }
  const endStr = contractType === '租送機'
    ? new Date(new Date().getFullYear()+2, new Date().getMonth(), new Date().getDate()).toISOString().split('T')[0]
    : '';
  editMode = false; editId = '';
  document.getElementById('form-modal-title').textContent = '新增合約';
  document.getElementById('form-modal-body').innerHTML = contractFormAssign(m, '', null, contractType, rent, deposit, endStr);
  document.getElementById('form-modal').classList.add('open');
}

// 從狀態更改→新增收款（買斷）
function openPaymentFromStatus(machineIdx) {
  const m = cache.machines[machineIdx];
  // 從價目表抓售價
  const priceRow = cache.pricelist.find(p => p['廠牌']===m['廠牌'] && p['機型']===m['機型']);
  const price = Number(priceRow?.['售價']||priceRow?.['買斷']||priceRow?.['機器買斷']||0);
  editMode = false; editId = ''; payMethod = '';
  selectedPayItems = ['機器買斷'];
  document.getElementById('form-modal-title').textContent = '新增收款（買斷）';
  document.getElementById('form-modal-body').innerHTML = paymentForm({
    '收款項目': '機器買斷',
    '詳細內容': `${m['機型']||''} ${m['機號']||''}`.trim(),
    '金額': price,
  });
  // 同時更新機器狀態為買斷
  m['_pendingStatus'] = '買 斷'; // 儲存後再更新
  document.getElementById('form-modal').classList.add('open');
}

// 套用自訂排序（編輯器排序後存入 order_custom_{key}）
function applyOrder(arr, customKey) {
  const order = JSON.parse(localStorage.getItem('order_'+customKey)||'null');
  if (!order) return arr;
  const ordered = order.filter(o=>arr.includes(o));
  const rest = arr.filter(o=>!ordered.includes(o));
  return [...ordered, ...rest];
}

  const custom = JSON.parse(localStorage.getItem('custom_voltages')||'[]');

function movePayItem(idx, dir) {
  const all = getPayItems();
  const newIdx = idx + dir;
  if (newIdx < 0 || newIdx >= all.length) return;
  let order = JSON.parse(localStorage.getItem('order_pay_items')||'null') || all;
  all.forEach(o=>{ if(!order.includes(o)) order.push(o); });
  order = order.filter(o=>all.includes(o));
  [order[idx], order[newIdx]] = [order[newIdx], order[idx]];
  localStorage.setItem('order_pay_items', JSON.stringify(order));
  openPayItemEditor();
}

function addPayEditorItem() {
  const inp = document.getElementById('pay-editor-inp');

    custom.push(val); localStorage.setItem('custom_pay_items', JSON.stringify(custom));

function moveChipEditorOption(idx, dir) {
  const {groupId, field, customKey} = _chipEditorState;
  const getters = {custom_lbs:getLbsOptions,custom_ice_types:getIceTypes,custom_voltages:getVoltages,custom_coolants:getCoolants,custom_brands:getBrands,custom_cooling:getCoolings};
  const fn = getters[customKey]; if (!fn) return;
  const opts = fn();
  const newIdx = idx + dir;
  if (newIdx < 0 || newIdx >= opts.length) return;
  // 調整順序：存入 custom_order_{customKey}
  const orderKey = 'order_' + customKey;
  let order = JSON.parse(localStorage.getItem(orderKey)||'null') || opts;
  // 確保 order 包含所有當前選項
  opts.forEach(o=>{ if(!order.includes(o)) order.push(o); });
  order = order.filter(o=>opts.includes(o));
  [order[idx], order[newIdx]] = [order[newIdx], order[idx]];
  localStorage.setItem(orderKey, JSON.stringify(order));
  renderChipEditorDeck();
}

function addChipEditorOption() {
  const inp = document.getElementById('chip-editor-inp');
  const val = inp?.value.trim();
  if (!val) return;
  const {groupId, field, customKey} = _chipEditorState;
  // 從黑名單移除（讓刪掉的選項可以重新加回）
  const defArrs2 = {custom_lbs:'lbs',custom_ice_types:'ice_types',custom_voltages:'voltages',custom_coolants:'coolants',custom_cooling:'cooling'};
  if (defArrs2[customKey]) {
    const bl = JSON.parse(localStorage.getItem('del_'+defArrs2[customKey])||'[]');
    localStorage.setItem('del_'+defArrs2[customKey], JSON.stringify(bl.filter(x=>x!==val)));
  }
  const custom = JSON.parse(localStorage.getItem(customKey)||'[]');
  if (!custom.includes(val)) {
    custom.push(val);
    localStorage.setItem(customKey, JSON.stringify(custom));
  }
  machineSelections[field] = machineSelections[field] || val;
  if (inp) inp.value = '';
  const getters = {
    custom_lbs:getLbsOptions, custom_ice_types:getIceTypes,
    custom_voltages:getVoltages, custom_coolants:getCoolants,
    custom_brands:getBrands, custom_cooling:getCoolings
  };
  const fn = getters[customKey];
  if (fn) renderMachineChipGroup(groupId, field, fn(), machineSelections[field], fn, customKey);
  renderChipEditorDeck();
  showToast(`已新增「${val}」`);
}

function deleteChipEditorOption(val) {
  if (!confirm(`刪除「${val}」嗎？`)) return;
  const {groupId, field, customKey} = _chipEditorState;
  const defArrs2 = {custom_lbs:'lbs',custom_ice_types:'ice_types',custom_voltages:'voltages',custom_coolants:'coolants',custom_cooling:'cooling'};
  const custom = JSON.parse(localStorage.getItem(customKey)||'[]');
  localStorage.setItem(customKey, JSON.stringify(custom.filter(x=>x!==val)));
  if (defArrs2[customKey]) {
    const bl = JSON.parse(localStorage.getItem('del_'+defArrs2[customKey])||'[]');
    if (!bl.includes(val)) { bl.push(val); localStorage.setItem('del_'+defArrs2[customKey], JSON.stringify(bl)); }
  }
  if (machineSelections[field]===val) machineSelections[field]='';
  const getters = {
    custom_lbs:getLbsOptions, custom_ice_types:getIceTypes,
    custom_voltages:getVoltages, custom_coolants:getCoolants,
    custom_brands:getBrands, custom_cooling:getCoolings
  };
  const fn = getters[customKey];
  if (fn) renderMachineChipGroup(groupId, field, fn(), machineSelections[field]||'', fn, customKey);
  renderChipEditorDeck();
  showToast(`已刪除「${val}」`);
}

function delMachineChip(groupId,field,val,customKey){
  const defArrs={custom_lbs:LBS_OPTIONS_DEFAULT,custom_ice_types:ICE_TYPES,custom_voltages:VOLTAGES_DEFAULT,custom_coolants:COOLANTS_DEFAULT,custom_brands:BRANDS_DEFAULT,custom_cooling:COOLING_DEFAULT,none:[]};
  // 所有選項都可以刪除（預設+自訂）
  if(!confirm(`刪除「${val}」嗎？`))return;
  const defArrs2={custom_lbs:'lbs',custom_ice_types:'ice_types',custom_voltages:'voltages',custom_coolants:'coolants',custom_cooling:'cooling'};
  const arr=JSON.parse(localStorage.getItem(customKey)||'[]');
  localStorage.setItem(customKey,JSON.stringify(arr.filter(x=>x!==val)));
  // 若是預設值，加入黑名單
  if(defArrs2[customKey]) {
    const bl=JSON.parse(localStorage.getItem('del_'+defArrs2[customKey])||'[]');
    if(!bl.includes(val)){bl.push(val);localStorage.setItem('del_'+defArrs2[customKey],JSON.stringify(bl));}
  }
  if(machineSelections[field]===val)machineSelections[field]='';
  const getters={custom_lbs:getLbsOptions,custom_ice_types:getIceTypes,custom_voltages:getVoltages,custom_coolants:getCoolants,custom_brands:getBrands,custom_cooling:getCoolings};
  const fn=getters[customKey];
  if(fn) renderMachineChipGroup(groupId,field,fn(),machineSelections[field]||'',fn,customKey);
  showToast(`已刪除「${val}」`);
}

function openEditItem(type, idx) {

    document.getElementById('form-modal-body').innerHTML = staffForm(item);

  }
  const maps = {customer:cache.customers, machine:cache.machines, contract:cache.contracts, payment:cache.payments, task:cache.tasks};
  const item = maps[type]?.[idx];
  if (!item) return;
  // 依資料類型取正確的 ID 欄位
  if (type === 'task') {
    editId = item['任務ID']||item['紀錄日期']||'';
  } else if (type === 'repair') {
    editId = item['維修ID']||item[Object.keys(item)[0]]||'';

  }

  const titles = {customer:'編輯客戶',machine:'編輯機器',contract:'編輯合約',payment:'編輯收款',task:'編輯施工紀錄'};
  document.getElementById('form-modal-title').textContent = titles[type];
  const body = document.getElementById('form-modal-body');
  switch(type) {
    case 'customer': body.innerHTML = customerForm(item); break;
    case 'machine':  body.innerHTML = machineForm(item); break;
    case 'task':     body.innerHTML = taskForm(item); break;
    case 'payment':
      payMethod=item['結帳方式']||'';

  }
  document.getElementById('form-modal').classList.add('open');

// ---- Payment Form ----
let payInvoice = '不開發票';
let payLineItems = []; // [{name, amount, taxable, detail}]

function initPayLines(d, prefillAmounts) {
  // prefillAmounts: {項目名: 金額} 例如 {租金: 3000}
  if (d?.['收款明細']) {
    try { payLineItems = JSON.parse(d['收款明細']); return; } catch(e) {}
  }
  payLineItems = selectedPayItems.map(name => ({
    name,
    amount: (prefillAmounts && prefillAmounts[name]) || 0,
    taxable: !['押金'].includes(name),
    detail: ''
  }));
}

function calcPayTotal() {
  let subtotal = 0, tax = 0;
  payLineItems.forEach(item => {
    const amt = parseFloat(item.amount)||0;
    subtotal += amt;
    if (item.taxable) tax += Math.round(amt * 0.05);
  });
  return { subtotal, tax, total: subtotal + tax };
}

function updatePayTotal() {
  payLineItems.forEach((item, i) => {
    const amtEl = document.getElementById('pay-line-amt-'+i);
    const taxEl = document.getElementById('pay-line-tax-'+i);
    const detEl = document.getElementById('pay-line-det-'+i);
    if (amtEl) item.amount = parseFloat(amtEl.value)||0;
    if (taxEl) item.taxable = taxEl.checked;
    if (detEl) item.detail = detEl.value;
  });
  const {subtotal, tax, total} = calcPayTotal();
  const s = document.getElementById('pay-subtotal');
  const t = document.getElementById('pay-tax');
  const tot = document.getElementById('pay-total');
  if (s) s.textContent = 'NT$' + subtotal.toLocaleString();
  if (t) t.textContent = 'NT$' + tax.toLocaleString();
  if (tot) tot.textContent = 'NT$' + total.toLocaleString();
  const fAmt = document.getElementById('f-amount');
  if (fAmt) fAmt.value = total;
}

function renderPayLines() {
  return payLineItems.map((item, i) => `
    <div class="pay-line-item" style="flex-wrap:wrap;gap:6px">
      <span class="pay-line-name">${item.name}</span>
      <div class="amt-row pay-line-amt">

        <input class="amt-inp" type="number" id="pay-line-amt-${i}" value="${item.amount||''}" min="0" placeholder="0" oninput="updatePayTotal()" style="font-size:0.929em">
      </div>
      <label class="pay-line-tax">
        <input type="checkbox" id="pay-line-tax-${i}" ${item.taxable?'checked':''} onchange="updatePayTotal()">

      <input class="fi" type="text" id="pay-line-det-${i}" value="${item.detail||''}" placeholder="細項說明..." oninput="updatePayTotal()" style="flex:1;min-width:120px;font-size:0.857em;margin-top:0;padding:6px 10px">
    </div>`).join('');
}

function togglePayItemAndLine(item) {

  // 切換選項
  togglePayItem(item);
  const isAdding = selectedPayItems.includes(item);
  if (isAdding) {
    // 新增：只加這一項，保留其他已有的
    payLineItems.push({
      name: item,
      amount: 0,
      taxable: !['押金'].includes(item),
      detail: ''

  const idx = selectedPayItems.indexOf(item);
  if (idx>=0) selectedPayItems.splice(idx,1);
  else selectedPayItems.push(item);
  document.querySelectorAll('.pay-item-chip').forEach(btn=>{
    btn.classList.toggle('selected', selectedPayItems.includes(btn.textContent));
  });

function addCustomPayItem() {
  const inp = document.getElementById('f-item-custom');
  const val = inp.value.trim();
  if (!val) return;
  // 存到localStorage
  const customItems = JSON.parse(localStorage.getItem('custom_pay_items')||'[]');
  if (!customItems.includes(val) && !PAY_ITEMS.includes(val)) {
    customItems.push(val);
    localStorage.setItem('custom_pay_items', JSON.stringify(customItems));
  }
  // 加入選中
  if (!selectedPayItems.includes(val)) selectedPayItems.push(val);
  // 重新渲染選項區
  const allItems = [...PAY_ITEMS, ...customItems.filter(i=>!PAY_ITEMS.includes(i))];
  const wrap = document.getElementById('pay-items-wrap');
  wrap.innerHTML = allItems.map(item=>`<button type="button" class="pay-item-chip${selectedPayItems.includes(item)?' selected':''}" onclick="togglePayItem('${item}')" oncontextmenu="event.preventDefault();confirmDeletePayItem('${item}')" ontouchstart="startLongPress('${item}')" ontouchend="cancelLongPress()" ontouchmove="cancelLongPress()">${item}</button>`).join('');
  inp.value = '';
}

// 長按刪除（手機）
let longPressTimer = null;
function startLongPress(item) {
  longPressTimer = setTimeout(() => confirmDeletePayItem(item), 600);
}
function cancelLongPress() {
  if (longPressTimer) { clearTimeout(longPressTimer); longPressTimer = null; }
}

function confirmDeletePayItem(item) {
  if (!confirm(`刪除「${item}」選項嗎？`)) return;
  const customItems = JSON.parse(localStorage.getItem('custom_pay_items')||'[]');
  const hidden = JSON.parse(localStorage.getItem('hidden_pay_items')||'[]');
  // 自訂項目：從清單移除；預設項目：加入黑名單隱藏
  if (PAY_ITEMS.includes(item)) {
    if (!hidden.includes(item)) hidden.push(item);
    localStorage.setItem('hidden_pay_items', JSON.stringify(hidden));
  } else {
    localStorage.setItem('custom_pay_items', JSON.stringify(customItems.filter(i=>i!==item)));
  }
  selectedPayItems = selectedPayItems.filter(i=>i!==item);
  const allItems = getPayItems();
  const wrap = document.getElementById('pay-items-wrap');
  if (wrap) wrap.innerHTML = allItems.map(i=>`<button type="button" class="pay-item-chip${selectedPayItems.includes(i)?' selected':''}" onclick="togglePayItem('${i}')" oncontextmenu="event.preventDefault();confirmDeletePayItem('${i}')" ontouchstart="startLongPress('${i}')" ontouchend="cancelLongPress()" ontouchmove="cancelLongPress()">${i}</button>`).join('');
  showToast(`已刪除「${item}」`);
}

// 取得有效收款項目（排除黑名單）
function getPayItems() {
  const hidden = JSON.parse(localStorage.getItem('hidden_pay_items')||'[]');
  const custom = JSON.parse(localStorage.getItem('custom_pay_items')||'[]');
  const arr = [...PAY_ITEMS.filter(i=>!hidden.includes(i)), ...custom.filter(i=>!PAY_ITEMS.includes(i)&&!hidden.includes(i))];
  return applyOrder(arr, 'order_pay_items');
}

    const isMe = h === loginName;
    const isSel = selectedHandlers.includes(h);
    return `<button type="button" class="pay-item-chip${isSel?' selected':''}" ${isMe?'style="cursor:default;box-shadow:0 0 0 2px var(--accent2)"':''} onclick="${isMe?'':'selectHandlerMulti(this,\''+h+'\')'}" oncontextmenu="${isMe?'':'event.preventDefault();confirmDeleteHandler(\''+h+'\')'}" ontouchstart="${isMe?'':'startHandlerLongPress(\''+h+'\')'}" ontouchend="cancelHandlerLongPress()" ontouchmove="cancelHandlerLongPress()">${h}${isMe?' 🔒':''}</button>`;
  }).join('');
  if (inp) inp.value = '';
}

let handlerLongPressTimer = null;
function startHandlerLongPress(h) {
  handlerLongPressTimer = setTimeout(() => confirmDeleteHandler(h), 600);
}
function cancelHandlerLongPress() {
  if (handlerLongPressTimer) { clearTimeout(handlerLongPressTimer); handlerLongPressTimer = null; }
}

function confirmDeleteHandler(h) {
  if (!confirm(`刪除「${h}」嗎？`)) return;
  const customHandlers = JSON.parse(localStorage.getItem('custom_handlers')||'[]');
  localStorage.setItem('custom_handlers', JSON.stringify(customHandlers.filter(x=>x!==h)));
  selectedHandlers = selectedHandlers.filter(x=>x!==h);
  const wrap = document.getElementById('handler-wrap');
  const allH = getAllHandlers();
  const loginName = authState?.name||'';
  if (wrap) wrap.innerHTML = allH.map(hh=>{
    const isMe = hh === loginName;
    const isSel = selectedHandlers.includes(hh);
    return `<button type="button" class="pay-item-chip${isSel?' selected':''}" ${isMe?'style="cursor:default;box-shadow:0 0 0 2px var(--accent2)"':''} onclick="${isMe?'':'selectHandlerMulti(this,\''+hh+'\')'}">${hh}${isMe?' 🔒':''}</button>`;
  }).join('');
  showToast(`已刪除「${h}」`);
}

function onAssignType(type) {
  closeModal('status-deck');
  closeModal('detail-modal');

  const customerName = pickerCustomerName;
  const customer = cache.customers.find(c=>c['客戶名稱']===customerName);
  editMode = false; editId = '';

  if (type === '買斷') {
    const priceRow = cache.pricelist.find(p=>p['廠牌']===m['廠牌'] && p['機型']===m['機型']);
    const price = Number(priceRow?.['售價']||priceRow?.['買斷']||priceRow?.['機器買斷']||0);
    selectedPayItems = ['機器買斷'];
    payMethod = ''; selectedHandlers = []; payLineItems = [];
    initPayLines(null, {'機器買斷': price});
    document.getElementById('form-modal-title').textContent = '新增收款（買斷）';
    document.getElementById('form-modal-body').innerHTML = paymentForm({
      '客戶名稱': customerName,
      '收款項目': '機器買斷',
      '詳細內容': `${m['機型']||''} ${m['機號']||''}`.trim(),
    });
    m['_pendingStatus'] = '買 斷';
    m['_pendingCustomer'] = customerName;
    document.getElementById('form-modal').classList.add('open');
  } else {
    // 租送 or 租賃 → 新增合約
    const contractType = type === '租送' ? '租送機' : '出租中';
    // 從價目表抓取租金押金
    const priceRow = cache.pricelist.find(p=>p['廠牌']===m['廠牌'] && p['機型']===m['機型']);
    let rent = 0, deposit = 0;
    if (priceRow) {
      if (type === '租送') {
        rent = Number(priceRow['租送 租金']||priceRow['租送租金']||priceRow['租金']||0);
        deposit = Number(priceRow['租送 押金']||priceRow['租送押金']||priceRow['押金']||0);
      } else {
        rent = Number(priceRow['租金']||0);
        deposit = rent * 2;
      }
    }
    // 到期日期：租送機填2年後，租賃（出租中）留空
    const today = new Date();
    const endStr = type === '租送'
      ? new Date(today.getFullYear()+2, today.getMonth(), today.getDate()).toISOString().split('T')[0]
      : '';

    document.getElementById('form-modal-title').textContent = '新增合約';
    document.getElementById('form-modal-body').innerHTML = contractFormAssign(m, customerName, customer, contractType, rent, deposit, endStr);
    document.getElementById('form-modal').classList.add('open');
  }
}
