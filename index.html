const SHEET_MAP = {customer:'customers',machine:'machines',contract:'contracts',payment:'payments',task:'施工紀錄',repair:'repairs'};
const ID_FIELD  = {customer:'客戶名稱',machine:'機號',contract:'合約ID',payment:'收款ID',task:'紀錄日期',repair:'維修ID'};

function getFieldVal(fieldId, customId) {
  const el = document.getElementById(fieldId);
  if (!el) return '';
  if (el.value === '__new__' || el.value === '__custom__') {
    const custom = document.getElementById(customId);
    return custom ? custom.value.trim() : '';
  }
  return el.value;
}

let isSaving = false;

async function doSave(type, data) {
  if (isSaving) return;
  isSaving = true;
  const sheet = SHEET_MAP[type];
  const idF = ID_FIELD[type];
  const arr = cache[sheet];
  if (editMode) {
    const idx = arr.findIndex(r=>String(r[idF])===String(editId));
    if (idx>=0) Object.assign(arr[idx], data);
    enqueue({action:'update', sheet, data, id:editId});
  } else {
    arr.push(data);
    // 傳入主鍵讓 App 端去重邏輯生效，防止網路重試重複送出
    const addId = data[idF] || null;
    enqueue({action:'add', sheet, data, id: addId});
  }
  saveCache();
  closeModal('form-modal');
  renderPage();
  showToast(editMode?'已更新':'已新增');
  setTimeout(() => { isSaving = false; }, 1000);
}

async function saveCustomer() {
  const name = document.getElementById('f-name').value.trim();
  if (!name) { showToast('請填寫客戶名稱'); return; }
  const phone = getPhoneValues();
  const addr  = document.getElementById('f-address').value.trim();
  const taxId = document.getElementById('f-tax-id')?.value.trim()||'';
  const owner = document.getElementById('f-owner')?.value.trim()||'';
  const ownerInfo = document.getElementById('f-owner-info')?.value.trim()||'';
  const note  = document.getElementById('f-note')?.value.trim()||'';
  const wasEdit = editMode;
  const oldName = editId;
  await doSave('customer', {'客戶名稱':name,'電話':phone,'地址':addr,'統一編號':taxId,'負責人':owner,'負責人 資訊':ownerInfo,'客戶備註':note});
  if (wasEdit && oldName) {
    cache.tasks.forEach(t => {
      if (t['客戶名稱'] === oldName || t['客戶名稱'] === name) {
        t['客戶名稱'] = name; t['電話'] = phone; t['地址'] = addr;
        enqueue({action:'update', sheet:'施工紀錄', data:t, id:t['任務ID']||t['紀錄日期']});
      }
    });
    cache.contracts.forEach(c => {
      if (c['客戶名稱'] === oldName || c['客戶名稱'] === name) {
        c['客戶名稱'] = name; c['電話'] = phone; c['地址'] = addr;
        enqueue({action:'update', sheet:'contracts', data:c, id:c['合約ID']});
      }
    });
    saveCache();
  }
  // 若從新增施工紀錄跳過來，儲存後跳回
  if (window._returnToTask) {
    window._returnToTask = false;
    const bk = window._taskFormBackup||{};
    selectedTaskItems = bk.items||[];
    setTimeout(()=>{
      editMode=false; editId='';
      document.getElementById('form-modal-title').textContent='新增施工紀錄';
      document.getElementById('form-modal-body').innerHTML=taskForm({
        '客戶名稱': name,
        '機型': bk.model||'', '機號': bk.serial||'',
        '備註': bk.note||'', '希望施工時間': bk.time||'',
      });
      document.getElementById('form-modal').classList.add('open');
    },200);
  }
  // 移機完成後的回呼（更新地址後詢問新增收款）
  if (window._afterCustomerEdit) {
    const cb = window._afterCustomerEdit;
    window._afterCustomerEdit = null;
    closeModal('form-modal');
    setTimeout(cb, 300);
  }
}

async function saveMachine() {
  const serial = document.getElementById('f-serial').value.trim();
  if (!serial) { showToast('請填寫機號'); return; }
  const statusVal = document.getElementById('f-status')?.value;
  if (!statusVal) { showToast('請選擇類型'); return; }
  window._prefillMachineType = null; // 清除預填標記
  // 機號重複檢查（新增時才檢查）
  if (!editMode) {
    const duplicate = cache.machines.find(m => String(m['機號']||'').trim() === serial);
    if (duplicate) { showToast(`⚠️ 機號「${serial}」已存在！請更換機號`); return; }
  }
  const brand = getFieldVal('f-brand','f-brand-custom');
  const model = getFieldVal('f-model','f-model-txt');
  const voltage = getFieldVal('f-voltage','f-voltage-txt');
  const coolant = getFieldVal('f-coolant','f-coolant-txt');
  const customerEl = document.getElementById('f-customer');
  const data = {
    '廠牌': brand, '機型': model, '機號': serial,
    '冰型': machineSelections.iceType||'',
    '磅數': machineSelections.lbs||'',
    '電壓': machineSelections.voltage||getFieldVal('f-voltage','f-voltage-txt')||'',
    '冷媒': machineSelections.coolant||getFieldVal('f-coolant','f-coolant-txt')||'',
    '散熱': machineSelections.cooling||'',
    '類型': document.getElementById('f-status').value
  };
  if (customerEl) data['目前客戶'] = customerEl.value.trim();
  const arrivedEl = document.getElementById('f-arrived-customer');
  const arrivedVal = arrivedEl?.value.trim() || '';
  if (arrivedVal) data['目前客戶'] = arrivedVal;
  await doSave('machine', data);

  // 新增機器後連動施工紀錄
  if (window._addMachineForTask) {
    const flags = window._addMachineForTask;
    const { customer: taskCustomer, taskData, isDismantled, afterInstall, isCustomerMachine, hasBorrow, isEstimateReturn } = flags;
    window._addMachineForTask = null;
    // 把新機器的機型機號寫回施工紀錄
    const taskToUpdate = cache.tasks.find(t => (t['任務ID']||t['紀錄日期']) === (taskData['任務ID']||taskData['紀錄日期']));
    if (taskToUpdate) {
      taskToUpdate['機型'] = data['機型'];
      taskToUpdate['機號'] = data['機號'];
      saveCache();
      enqueue({action:'update', sheet:'施工紀錄', data:taskToUpdate, id:taskToUpdate['任務ID']||taskToUpdate['紀錄日期']});
    }
    setTimeout(()=>{
      if (isDismantled) {
        // 舊版搬回流程
        const deck = document.getElementById('confirm-deck');
        document.getElementById('confirm-deck-title').textContent = '搬回後機器狀態';
        document.getElementById('confirm-deck-msg').textContent = '請選擇搬回後此機器的狀態：';
        const btns = deck.querySelector('div[style*="display:flex"]');
        const newBtns = btns.cloneNode(false);
        newBtns.innerHTML = `
          <button style="flex:1;padding:12px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:0.929em;font-family:inherit;cursor:pointer" id="_dm_btn1">待出租</button>
          <button style="flex:1;padding:12px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:0.929em;font-family:inherit;cursor:pointer" id="_dm_btn2">◎進廠</button>
          <button style="flex:1;padding:12px;background:transparent;border:1px solid var(--border);border-radius:10px;color:var(--text3);font-size:0.929em;font-family:inherit;cursor:pointer" id="_dm_btn3">取消</button>`;
        btns.parentNode.replaceChild(newBtns, btns);
        newBtns.querySelector('#_dm_btn1').onclick=()=>{ deck.classList.remove('open'); updateMachineStatus(data['機型'],data['機號'],'待出租'); confirmTaskDone(); };
        newBtns.querySelector('#_dm_btn2').onclick=()=>{ deck.classList.remove('open'); updateMachineStatus(data['機型'],data['機號'],'◎進廠'); confirmTaskDone(); };
        newBtns.querySelector('#_dm_btn3').onclick=()=>{ deck.classList.remove('open'); window._pendingDoneTask=null; };
        deck.classList.add('open');
      } else if (afterInstall) {
        // 裝機（無機號→新增機器）→ 直接跳新增收款（裝機費）
        openQuickPayment(taskCustomer, taskData, ['裝機費']);
        confirmTaskDone();
      } else if (isEstimateReturn) {
        // 拆回估回：機器已建（◎進廠），新增收款（估回）
        openQuickPayment(taskCustomer, { '客戶名稱':taskCustomer, '機型':data['機型'], '機號':data['機號'] }, ['估回']);
        confirmTaskDone();
      } else if (isCustomerMachine) {
        // 搬回修理客人機：機器已建 → 若有借用機先選
        if (hasBorrow) {
          openBorrowMachinePicker(()=>{
            openQuickRepairFromTask(taskCustomer, data['機型'], data['機號'], taskData);
          });
        } else {
          openQuickRepairFromTask(taskCustomer, data['機型'], data['機號'], taskData);
        }
      } else {
        // 一般裝機：直接跳新增收款（裝機費）
        openQuickPayment(taskCustomer, taskData, ['裝機費']);
        confirmTaskDone();
      }
    }, 400);
  }
}

function getAllHandlers() {
  const fromStaff = cache.staff.map(s => s['姓名']||s['名稱']||s['名字']).filter(Boolean);
  const fromData = [...new Set(
    cache.payments.flatMap(p => (p['經手人']||'').split(/[,、，]/).map(s=>s.trim())).filter(Boolean)
  )];
  const customHandlers = JSON.parse(localStorage.getItem('custom_handlers')||'[]');
  return [...new Set([...fromStaff, ...fromData, ...customHandlers])];
}

async function savePayment() {
  const customer = document.getElementById('f-pay-customer-inp')?.value.trim() || document.getElementById('f-customer')?.value;
  if (!customer) { showToast('請填寫客戶名稱'); return; }
  if (!payMethod) { showToast('請選擇結帳方式'); return; }
  const items = selectedPayItems.length ? selectedPayItems.join('、') : '';
  if (!items) { showToast('請選擇收款項目'); return; }
  if (!payInvoice) { showToast('請選擇發票選項'); return; }
  const handler = selectedHandlers.join('、');
  if (!handler) { showToast('請選擇經手人'); return; }
  updatePayTotal();
  const {total} = calcPayTotal();
  const finalAmount = total || parseInt(document.getElementById('f-amount').value)||0;
  const invoiceNo = document.getElementById('f-invoice-no')?.value.trim()||'';
  const taxIdPay  = document.getElementById('f-tax-id-pay')?.value.trim()||'';

  // 產生純文字細項說明供試算表閱讀
  const lineItemsText = payLineItems.length
    ? payLineItems.map(l => {
        const tax = l.taxable ? '(含稅)' : '';
        const det = l.detail ? ` [${l.detail}]` : '';
        return `${l.name}: NT$${Number(l.amount||0).toLocaleString()}${tax}${det}`;
      }).join(' / ')
    : '';

  await doSave('payment', {
    '收款ID': document.getElementById('f-pid').value,
    '合約ID': document.getElementById('f-cid').value,
    '客戶名稱': customer,
    '收款項目': items,
    '詳細內容': document.getElementById('f-detail')?.value.trim()||'',
    '金額': finalAmount,
    '收款明細': payLineItems.length ? JSON.stringify(payLineItems) : '',
    '細項說明': lineItemsText,
    '發票': payInvoice + (invoiceNo ? ' '+invoiceNo : ''),
    '統一編號': taxIdPay,
    '結帳方式': payMethod,
    '結帳日期': document.getElementById('f-date').value.replace(/-/g,'/'),
    '經手人': handler,
  });
  selectedPayItems = []; selectedHandlers = []; payLineItems = [];
  const pendingM = cache.machines.find(m => m['_pendingStatus'] === '買 斷');
  if (pendingM) {
    pendingM['類型'] = '買 斷';
    pendingM['目前客戶'] = customer;
    delete pendingM['_pendingStatus'];
    saveCache();
    enqueue({ action:'update', sheet:'machines', data: pendingM, id: pendingM['機號'] });
  }
}

async function saveContract() {
  const customer = document.getElementById('f-customer').value;
  if (!customer) { showToast('請選擇客戶'); return; }
  const c = cache.customers.find(x=>x['客戶名稱']===customer);
  const serial = document.getElementById('f-serial').value.trim();
  const contractStatus = document.getElementById('f-status').value;
  await doSave('contract', {'合約ID':document.getElementById('f-cid').value,'客戶名稱':customer,'電話':c?.['電話']||'','地址':c?.['地址']||'','機型':document.getElementById('f-model').value.trim(),'機號':serial,'租借日期':document.getElementById('f-start').value.replace(/-/g,'/'),'到期日期':document.getElementById('f-end').value.replace(/-/g,'/'),'租金':parseInt(document.getElementById('f-rent').value)||0,'押金':parseInt(document.getElementById('f-deposit').value)||0,'類型':contractStatus});
  // 同步更新機器的目前客戶和狀態
  if (serial) {
    const machine = cache.machines.find(m => m['機號'] === serial);
    if (machine) {
      machine['目前客戶'] = customer;
      machine['類型'] = contractStatus === '租送機' ? '租送機' : '出租中';
      saveCache();
      enqueue({ action:'update', sheet:'machines', data: machine, id: machine['機號'] });
    }
  }
}

const STAFF_ROLES = ['管理員','工程師','帳款專員'];
let _staffRoles = []; // 目前選取的角色陣列

function toggleStaffRole(r) {
  const idx = _staffRoles.indexOf(r);
  if (idx >= 0) _staffRoles.splice(idx,1); else _staffRoles.push(r);
  document.querySelectorAll('.staff-role-chip').forEach(b => {
    b.classList.toggle('selected', _staffRoles.includes(b.dataset.role));
  });
}

  const list = cache.staff||[];
  if (!list.length) return '<div class="empty">尚無職員資料<br><br><span style="font-size:0.857em;color:var(--text3)">請先連線同步試算表</span></div>';
  return `<div style="padding-bottom:80px">
    ${list.map((s,i)=>{
      const name  = s['姓名']||'';

  document.getElementById('detail-modal-title').textContent = item['姓名']||'職員詳情';
  document.getElementById('detail-edit-btn').style.display = 'none';
  detailType = 'staff'; detailIdx = idx;
  const phone = item['電話']||'';
  const email = item['E-mail']||item['Email']||'';

    {k:'角色',      v: item['角色']||''},
    {k:'電話',      v: phone,    phone: true},
    {k:'Email',     v: email},

    {k:'備註',      v: item['備註']||''},

        : r.phone ? r.v+' <a href="tel:'+r.v+'" style="background:var(--green-bg);color:var(--green2);border:1px solid rgba(67,160,71,.3);border-radius:6px;padding:3px 9px;font-size:11px;text-decoration:none;white-space:nowrap">📞</a>'
        : String(r.v))

    + '<button class="btn-cancel" style="width:100%;color:var(--danger2)" onclick="confirmDeleteStaff('+idx+')">🗑 刪除</button>'
    + '</div>';

function staffEditInPlace(idx) {
  const item = (cache.staff||[])[idx];
  if (!item) return;
  isSaving = false;
  editMode = true;
  editId = item['姓名']||'';
  // 在 detail-modal 原地替換為編輯表單，不關閉再開（避免手機觸控延遲問題）
  document.getElementById('detail-modal-title').textContent = '編輯職員';
  const curRoles = item['角色'] ? String(item['角色']).split(/[,、，]/).map(s=>s.trim()).filter(Boolean) : [];
  _staffRoles = [...curRoles];
  const roleChips = STAFF_ROLES.map(r=>{
    const sel = curRoles.includes(r) ? ' selected' : '';
    return '<button type="button" data-role="'+r+'" class="pay-item-chip staff-role-chip'+sel+'" onclick="toggleStaffRole(\''+r+'\')">'+r+'</button>';

    +'<div class="ff"><label>電話</label><input class="fi" id="se-phone" type="tel" value="'+esc(item['電話'])+'"></div>'
    +'<div class="ff"><label>E-mail</label><input class="fi" id="se-email" type="email" value="'+esc(item['E-mail']||item['Email'])+'"></div>'
    +'<div class="ff"><label>地址</label><input class="fi" id="se-addr" value="'+esc(item['地址'])+'"></div>'
    +'<div class="ff"><label>備註</label><input class="fi" id="se-note" value="'+esc(item['備註'])+'"></div>'
    +'<div class="ff"><label>身分證號</label><input class="fi" id="se-id" value="'+esc(item['身分證號'])+'"></div>'
    +'<div class="ff"><label>PIN</label><input class="fi" id="se-pin" type="text" inputmode="numeric" maxlength="8" value="'+esc(item['PIN'])+'"></div>'
    +'</div>'
    +'<div class="form-actions">'
    +'<button class="btn-cancel" onclick="showStaffDetail('+idx+')">取消</button>'
    +'<button class="btn-save" onclick="saveStaffEdit('+idx+')">儲存</button>'
    +'</div>';
}

async function saveStaffEdit(idx) {
  if (isSaving) return;
  isSaving = true;
  try {
    const name = (document.getElementById('se-name')?.value||'').trim();
    if (!name) { showToast('請填寫姓名'); return; }
    const data = {
      '姓名':   name,
      '角色':   _staffRoles.join('、'),
      '電話':   (document.getElementById('se-phone')?.value||'').trim(),
      'E-mail': (document.getElementById('se-email')?.value||'').trim(),
      '地址':   (document.getElementById('se-addr')?.value||'').trim(),
      '備註':   (document.getElementById('se-note')?.value||'').trim(),
      '身分證號':(document.getElementById('se-id')?.value||'').trim(),
      'PIN':    (document.getElementById('se-pin')?.value||'').trim(),
    };
    if (!cache.staff) cache.staff=[];
    const fi = cache.staff.findIndex(r=>String(r['姓名']||'')===String(editId));
    if (fi>=0) Object.assign(cache.staff[fi], data); else cache.staff.push(data);
    enqueue({action:'update', sheet:'staff', data, id:editId});
    saveCache();
    editMode=false; editId='';
    closeModal('detail-modal');
    renderPage();
    showToast('✓ 已更新職員');
  } catch(e) {
    showToast('儲存失敗：'+e.message);
  } finally {
    isSaving=false;
  }
}

function confirmDeleteStaff(idx) {
  if (!confirm('確定要刪除這位職員嗎？')) return;
  const item = (cache.staff||[])[idx];
  if (!item) return;
  const id = item['姓名']||'';
  cache.staff.splice(idx,1);
  saveCache();
  enqueue({action:'delete', sheet:'staff', data:null, id});
  closeModal('detail-modal');
  renderPage();
  showToast('已刪除');
}

async function saveStaff() {
  if (isSaving) return; isSaving = true;
  try {
    const name  = document.getElementById('f-staff-name')?.value.trim();
    if (!name) { showToast('請填寫姓名'); return; }
    const role  = _staffRoles.join('、');
    const phone = document.getElementById('f-staff-phone')?.value.trim()||'';
    const email = document.getElementById('f-staff-email')?.value.trim()||'';
    const addr  = document.getElementById('f-staff-addr')?.value.trim()||'';
    const note  = document.getElementById('f-staff-note')?.value.trim()||'';
    const idNo  = document.getElementById('f-staff-id')?.value.trim()||'';
    const pin   = document.getElementById('f-staff-pin')?.value.trim()||'';
    const data  = { '姓名':name, '角色':role, '電話':phone, 'E-mail':email, '地址':addr, '備註':note, '身分證號':idNo, 'PIN':pin };

    if (!cache.staff) cache.staff=[];
    if (editMode) {
      const idx = cache.staff.findIndex(r=>String(r['姓名']||'')===String(editId));
      if (idx>=0) Object.assign(cache.staff[idx], data); else cache.staff.push(data);
      enqueue({action:'update', sheet:'staff', data, id:editId});
    } else {
      cache.staff.push(data);
      enqueue({action:'add', sheet:'staff', data, id:name});
    }
    saveCache();
    closeModal('form-modal');
    renderPage();
    showToast(editMode?'✓ 已更新職員':'✓ 已新增職員');
  } catch(e) {
    showToast('儲存失敗：'+e.message);
  } finally {
    isSaving = false;
  }
}
// ============================================================
function confirmDelete(type, idx) {
  if (!confirm('確定要刪除這筆資料嗎？')) return;
  const sheet = SHEET_MAP[type]; // 用於 enqueue 的工作表名稱
  // 依類型取 cache 陣列（task 的 cache key 是 'tasks'，不是工作表名稱）
  const cacheKey = type === 'task' ? 'tasks' : sheet;
  const arr = cache[cacheKey];
  const item = arr?.[idx];
  if (!item) return;
  const id = type === 'task'
    ? (item['任務ID']||item['紀錄日期'])
    : item[ID_FIELD[type]];
  arr.splice(idx, 1);
  saveCache();
  enqueue({action:'delete', sheet, data:null, id});
  closeModal('detail-modal');
  renderPage();
  showToast('已刪除');
}

function closeModal(id) { document.getElementById(id).classList.remove('open'); }

function handleOverlayClick(e, modalId) {
  // Close if clicking the overlay background (not the modal content)
  if (e.target === document.getElementById(modalId)) closeModal(modalId);
}

// TOAST
// ============================================================
function showToast(msg, duration) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), duration||2500);
}
