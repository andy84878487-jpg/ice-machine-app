  // 切換選項
  togglePayItem(item);
  const isAdding = selectedPayItems.includes(item);
  if (isAdding) {
    // 新增：只加這一項，保留其他已有的
    payLineItems.push({
      name: item,
      amount: 0,
      taxable: !['押金'].includes(item),
      detail: ''
    });
  } else {
    // 移除：只刪這一項，保留其他
    payLineItems = payLineItems.filter(l => l.name !== item);
  }
  const wrap = document.getElementById('pay-lines-wrap');
  const section = document.getElementById('pay-lines-section');
  if (wrap) wrap.innerHTML = renderPayLines();
  if (section) section.style.display = payLineItems.length ? '' : 'none';
  updatePayTotal();
}

// Pay item multi-select
function togglePayItem(item) {
  const idx = selectedPayItems.indexOf(item);
  if (idx>=0) selectedPayItems.splice(idx,1);
  else selectedPayItems.push(item);
  document.querySelectorAll('.pay-item-chip').forEach(btn=>{
    btn.classList.toggle('selected', selectedPayItems.includes(btn.textContent));
  });
}

function addCustomPayItem() {
  const inp = document.getElementById('f-item-custom');
  const val = inp.value.trim();
  if (!val) return;
  // 存到localStorage
  const customItems = JSON.parse(localStorage.getItem('custom_pay_items')||'[]');
  if (!customItems.includes(val) && !PAY_ITEMS.includes(val)) {
    customItems.push(val);
    localStorage.setItem('custom_pay_items', JSON.stringify(customItems));
  }
  // 加入選中
  if (!selectedPayItems.includes(val)) selectedPayItems.push(val);
  // 重新渲染選項區
  const allItems = [...PAY_ITEMS, ...customItems.filter(i=>!PAY_ITEMS.includes(i))];
  const wrap = document.getElementById('pay-items-wrap');
  wrap.innerHTML = allItems.map(item=>`<button type="button" class="pay-item-chip${selectedPayItems.includes(item)?' selected':''}" onclick="togglePayItem('${item}')" oncontextmenu="event.preventDefault();confirmDeletePayItem('${item}')" ontouchstart="startLongPress('${item}')" ontouchend="cancelLongPress()" ontouchmove="cancelLongPress()">${item}</button>`).join('');
  inp.value = '';
}

let longPressTimer = null;
function startLongPress(item) {
  longPressTimer = setTimeout(() => confirmDeletePayItem(item), 600);
}
function cancelLongPress() {
  if (longPressTimer) { clearTimeout(longPressTimer); longPressTimer = null; }
}

function confirmDeletePayItem(item) {
  if (!confirm(`刪除「${item}」選項嗎？`)) return;
  const customItems = JSON.parse(localStorage.getItem('custom_pay_items')||'[]');
  const hidden = JSON.parse(localStorage.getItem('hidden_pay_items')||'[]');
  // 自訂項目：從清單移除；預設項目：加入黑名單隱藏
  if (PAY_ITEMS.includes(item)) {
    if (!hidden.includes(item)) hidden.push(item);
    localStorage.setItem('hidden_pay_items', JSON.stringify(hidden));
  } else {
    localStorage.setItem('custom_pay_items', JSON.stringify(customItems.filter(i=>i!==item)));
  }
  selectedPayItems = selectedPayItems.filter(i=>i!==item);
  const allItems = getPayItems();
  const wrap = document.getElementById('pay-items-wrap');
  if (wrap) wrap.innerHTML = allItems.map(i=>`<button type="button" class="pay-item-chip${selectedPayItems.includes(i)?' selected':''}" onclick="togglePayItem('${i}')" oncontextmenu="event.preventDefault();confirmDeletePayItem('${i}')" ontouchstart="startLongPress('${i}')" ontouchend="cancelLongPress()" ontouchmove="cancelLongPress()">${i}</button>`).join('');
  showToast(`已刪除「${item}」`);
}

// 取得有效收款項目（排除黑名單）
function getPayItems() {
  const hidden = JSON.parse(localStorage.getItem('hidden_pay_items')||'[]');
  const custom = JSON.parse(localStorage.getItem('custom_pay_items')||'[]');
  return [...PAY_ITEMS.filter(i=>!hidden.includes(i)), ...custom.filter(i=>!PAY_ITEMS.includes(i))];
}

function onAssignType(type) {
  closeModal('status-deck');
  closeModal('detail-modal');
  const m = cache.machines[pickerMachineIdx];
  const customerName = pickerCustomerName;
  const customer = cache.customers.find(c=>c['客戶名稱']===customerName);
  editMode = false; editId = '';

  if (type === '買斷') {
    const priceRow = cache.pricelist.find(p=>p['廠牌']===m['廠牌'] && p['機型']===m['機型']);
    const price = Number(priceRow?.['售價']||priceRow?.['買斷']||priceRow?.['機器買斷']||0);
    selectedPayItems = ['機器買斷'];
    payMethod = ''; selectedHandlers = []; payLineItems = [];
    initPayLines(null, {'機器買斷': price});
    document.getElementById('form-modal-title').textContent = '新增收款（買斷）';
    document.getElementById('form-modal-body').innerHTML = paymentForm({
      '客戶名稱': customerName,
      '收款項目': '機器買斷',
      '詳細內容': `${m['機型']||''} ${m['機號']||''}`.trim(),
    });
    m['_pendingStatus'] = '買 斷';
    m['_pendingCustomer'] = customerName;
    document.getElementById('form-modal').classList.add('open');
  } else {
    // 租送 or 租賃 → 新增合約
    const contractType = type === '租送' ? '租送機' : '出租中';
    // 從價目表抓取租金押金
    const priceRow = cache.pricelist.find(p=>p['廠牌']===m['廠牌'] && p['機型']===m['機型']);
    let rent = 0, deposit = 0;
    if (priceRow) {
      if (type === '租送') {
        rent = Number(priceRow['租送 租金']||priceRow['租送租金']||priceRow['租金']||0);
        deposit = Number(priceRow['租送 押金']||priceRow['租送押金']||priceRow['押金']||0);
      } else {
        rent = Number(priceRow['租金']||0);
        deposit = rent * 2;
      }
    }
    // 到期日期：租送機填2年後，租賃（出租中）留空
    const today = new Date();
    const endStr = type === '租送'
      ? new Date(today.getFullYear()+2, today.getMonth(), today.getDate()).toISOString().split('T')[0]
      : '';

    document.getElementById('form-modal-title').textContent = '新增合約';
    document.getElementById('form-modal-body').innerHTML = contractFormAssign(m, customerName, customer, contractType, rent, deposit, endStr);
    document.getElementById('form-modal').classList.add('open');
  }
}

const SHEET_MAP = {customer:'customers',machine:'machines',contract:'contracts',payment:'payments',task:'tasks'};
const ID_FIELD  = {customer:'客戶名稱',machine:'機號',contract:'合約ID',payment:'收款ID',task:'紀錄日期'};

function getFieldVal(fieldId, customId) {
  const el = document.getElementById(fieldId);
  if (!el) return '';
  if (el.value === '__new__' || el.value === '__custom__') {
    const custom = document.getElementById(customId);
    return custom ? custom.value.trim() : '';
  }
  return el.value;
}

let isSaving = false;

async function doSave(type, data) {
  if (isSaving) return;
  isSaving = true;
  const sheet = SHEET_MAP[type];
  const idF = ID_FIELD[type];
  const arr = cache[sheet];
  if (editMode) {
    const idx = arr.findIndex(r=>String(r[idF])===String(editId));
    if (idx>=0) Object.assign(arr[idx], data);
    enqueue({action:'update', sheet, data, id:editId});
  } else {
    arr.push(data);
    enqueue({action:'add', sheet, data, id:null});
  }
  saveCache();
  closeModal('form-modal');
  renderPage();
  showToast(editMode?'已更新':'已新增');
  setTimeout(() => { isSaving = false; }, 1000);
}

  const statusVal = document.getElementById('f-status')?.value;

  window._prefillMachineType = null; // 清除預填標記

    const duplicate = cache.machines.find(m => String(m['機號']||'').trim() === serial);
    if (duplicate) { showToast(`⚠️ 機號「${serial}」已存在！請更換機號`); return; }
  }
  const brand = getFieldVal('f-brand','f-brand-custom');
  const model = getFieldVal('f-model','f-model-txt');
  const voltage = getFieldVal('f-voltage','f-voltage-txt');
  const coolant = getFieldVal('f-coolant','f-coolant-txt');
  const customerEl = document.getElementById('f-customer');
  const data = {
    '廠牌': brand, '機型': model, '機號': serial,
    '冰型': machineSelections.iceType||'',
    '磅數': machineSelections.lbs||'',
    '電壓': machineSelections.voltage||getFieldVal('f-voltage','f-voltage-txt')||'',
    '冷媒': machineSelections.coolant||getFieldVal('f-coolant','f-coolant-txt')||'',
    '散熱': machineSelections.cooling||'',
    '類型': document.getElementById('f-status').value
  };
  if (customerEl) data['目前客戶'] = customerEl.value.trim();
  const arrivedEl = document.getElementById('f-arrived-customer');
  if (arrivedEl) data['已到客戶'] = arrivedEl.value.trim();
  await doSave('machine', data);

  // 如果是從裝機工作跳來的，新增完後跳新增收款
  if (window._addMachineForTask) {
    const { customer: taskCustomer, taskData } = window._addMachineForTask;
    window._addMachineForTask = null;
    setTimeout(()=>{
      openQuickPayment(taskCustomer, taskData, ['裝機費']);
      confirmTaskDone();
    }, 400);
  }
}

function getAllHandlers() {
  const fromStaff = cache.staff.map(s => s['姓名']||s['名稱']||s['名字']).filter(Boolean);
  const fromData = [...new Set(
    cache.payments.flatMap(p => (p['經手人']||'').split(/[,、，]/).map(s=>s.trim())).filter(Boolean)
  )];
  const customHandlers = JSON.parse(localStorage.getItem('custom_handlers')||'[]');
  return [...new Set([...fromStaff, ...fromData, ...customHandlers])];
}

async function savePayment() {
  const customer = document.getElementById('f-pay-customer-inp')?.value.trim() || document.getElementById('f-customer')?.value;
  if (!customer) { showToast('請填寫客戶名稱'); return; }
  if (!payMethod) { showToast('請選擇結帳方式'); return; }
  const items = selectedPayItems.length ? selectedPayItems.join('、') : '';
  if (!items) { showToast('請選擇收款項目'); return; }
  if (!payInvoice) { showToast('請選擇發票選項'); return; }
  const handler = selectedHandlers.join('、');
  if (!handler) { showToast('請選擇經手人'); return; }
  updatePayTotal();
  const {total} = calcPayTotal();
  const finalAmount = total || parseInt(document.getElementById('f-amount').value)||0;
  const invoiceNo = document.getElementById('f-invoice-no')?.value.trim()||'';
  await doSave('payment', {
    '收款ID': document.getElementById('f-pid').value,
    '合約ID': document.getElementById('f-cid').value,
    '客戶名稱': customer,
    '收款項目': items,
    '詳細內容': document.getElementById('f-detail')?.value.trim()||'',
    '金額': finalAmount,
    '收款明細': payLineItems.length ? JSON.stringify(payLineItems) : '',
    '發票': payInvoice + (invoiceNo ? ' '+invoiceNo : ''),
    '結帳方式': payMethod,
    '結帳日期': document.getElementById('f-date').value.replace(/-/g,'/'),
    '經手人': handler,
  });
  selectedPayItems = []; selectedHandlers = []; payLineItems = [];
  const pendingM = cache.machines.find(m => m['_pendingStatus'] === '買 斷');
  if (pendingM) {
    pendingM['類型'] = '買 斷';
    pendingM['已到客戶'] = customer;
    delete pendingM['_pendingStatus'];
    saveCache();
    enqueue({ action:'update', sheet:'machines', data: pendingM, id: pendingM['機號'] });
  }
}

async function saveContract() {
  const customer = document.getElementById('f-customer').value;
  if (!customer) { showToast('請選擇客戶'); return; }
  const c = cache.customers.find(x=>x['客戶名稱']===customer);
  const serial = document.getElementById('f-serial').value.trim();
  const contractStatus = document.getElementById('f-status').value;
  await doSave('contract', {'合約ID':document.getElementById('f-cid').value,'客戶名稱':customer,'電話':c?.['電話']||'','地址':c?.['地址']||'','機型':document.getElementById('f-model').value.trim(),'機號':serial,'租借日期':document.getElementById('f-start').value.replace(/-/g,'/'),'到期日期':document.getElementById('f-end').value.replace(/-/g,'/'),'租金':parseInt(document.getElementById('f-rent').value)||0,'押金':parseInt(document.getElementById('f-deposit').value)||0,'類型':contractStatus});
  // 同步更新機器的目前客戶和狀態
  if (serial) {
    const machine = cache.machines.find(m => m['機號'] === serial);
    if (machine) {
      machine['目前客戶'] = customer;
      machine['類型'] = contractStatus === '租送機' ? '租送機' : '出租中';
      saveCache();
      enqueue({ action:'update', sheet:'machines', data: machine, id: machine['機號'] });
    }
  }
}

// ============================================================
// DELETE
// ============================================================
function confirmDelete(type, idx) {
  if (!confirm('確定要刪除這筆資料嗎？')) return;
  const sheet = SHEET_MAP[type];
  const idF = ID_FIELD[type];
  const arr = cache[sheet];
  const item = arr[idx];
  if (!item) return;
  const id = item[idF];
  arr.splice(idx,1);
  saveCache();
  // task用staffUrl，其他用mainUrl
  if (type === 'task') {
    pendingQueue.push({action:'delete', sheet, data:null, id, url:'staff', ts:Date.now()});
    saveQueue();
    flushTaskQueue();
  } else {
    enqueue({action:'delete', sheet, data:null, id});
  }
  closeModal('detail-modal');
  renderPage();
  showToast('已刪除');
}

// ============================================================
// MODALS
// ============================================================
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

function handleOverlayClick(e, modalId) {
  // Close if clicking the overlay background (not the modal content)
  if (e.target === document.getElementById(modalId)) closeModal(modalId);
}

// ============================================================
// TOAST
// ============================================================
function showToast(msg, duration) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), duration||2500);
}

// ============================================================
// INIT
// ============================================================
updateOfflineBanner();
updatePendingBadge();
initAppearance();
renderPage();

// 清除超過24小時的舊 pendingQueue（避免累積的失敗操作無限重試）
const _24h = 24 * 60 * 60 * 1000;
const _oldLen = pendingQueue.length;
pendingQueue = pendingQueue.filter(op => Date.now() - (op.ts||0) < _24h);
if (pendingQueue.length !== _oldLen) { saveQueue(); console.log('清除過舊的 pendingQueue', _oldLen - pendingQueue.length, '筆'); }

if (cfg.url) {
  syncAll().then(() => initAuth());
} else {
  initAuth();
}
startAutoSync();
</script>
